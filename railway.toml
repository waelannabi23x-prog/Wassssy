[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20", "go_1_22", "python3"]

[build.nixpacksPlan.phases.build]
cmds = [
  "npm ci --omit=dev --ignore-scripts",
  "cd go-search && go mod download && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags='-s -w' -trimpath -o ../search-svc . && cd .."
]

[deploy]
startCommand = "sh -c '(DATABASE_URL=$DATABASE_URL SEARCH_PORT=3001 ./search-svc &) && sleep 2 && node --max-old-space-size=460 --optimize-for-size --expose-gc index.js'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
region = "europe-west4"

[deploy.healthcheck]
path = "/health"
intervalSeconds = 30
timeoutSeconds  = 10
