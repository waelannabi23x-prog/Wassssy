[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20"]

[deploy]
startCommand = "node --max-old-space-size=460 --optimize-for-size --expose-gc --gc-interval=100 index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
region = "europe-west4"

[deploy.healthcheck]
path = "/health"
intervalSeconds = 30
timeoutSeconds = 10
