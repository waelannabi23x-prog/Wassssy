<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🛡️ لوحة الإدارة</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#04040c;--s:#0c0c1a;--s2:#121224;--s3:#191930;--s4:#20203c;
  --accent:#7c6fff;--accent2:#e040fb;--accent3:#00bcd4;
  --green:#00e676;--red:#ff5252;--gold:#ffd740;--orange:#ff9100;
  --text:#f0f0ff;--text2:#8888bb;--text3:#44446a;
  --border:rgba(255,255,255,.06);--border2:rgba(124,111,255,.25);
  --r:14px;--r-sm:10px;--r-xs:7px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
#hdr{flex-shrink:0;padding:10px 14px;background:rgba(4,4,12,.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;backdrop-filter:blur(20px);position:relative}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
.hdr-logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.hdr-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px}
.hdr-badge.owner{background:linear-gradient(135deg,rgba(255,215,64,.2),rgba(255,152,0,.2));color:var(--gold);border:1px solid rgba(255,215,64,.3)}
.hdr-badge.admin{background:rgba(124,111,255,.15);color:var(--accent);border:1px solid var(--border2)}

/* NAV */
#nav{flex-shrink:0;display:flex;background:var(--s);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#nav::-webkit-scrollbar{display:none}
.nb{padding:9px 12px;font-size:10px;font-weight:700;color:var(--text3);background:none;border:none;cursor:pointer;white-space:nowrap;letter-spacing:.6px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:4px}
.nb.on{color:var(--accent);border-bottom-color:var(--accent);background:rgba(124,111,255,.05)}

/* CONTENT */
#pg{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
#pg::-webkit-scrollbar{width:2px}
#pg::-webkit-scrollbar-thumb{background:var(--s4)}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--s);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center;position:relative;overflow:hidden;cursor:default}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.a::before{background:var(--accent)}.sc.g::before{background:var(--green)}.sc.r::before{background:var(--red)}.sc.gold::before{background:var(--gold)}.sc.p::before{background:var(--accent2)}.sc.b::before{background:var(--accent3)}.sc.o::before{background:var(--orange)}
.sv{font-size:26px;font-weight:900;line-height:1;margin-bottom:3px}
.sv.a{color:var(--accent)}.sv.g{color:var(--green)}.sv.r{color:var(--red)}.sv.gold{color:var(--gold)}.sv.p{color:var(--accent2)}.sv.b{color:var(--accent3)}.sv.o{color:var(--orange)}
.sl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.6px;text-transform:uppercase}

/* SECTION */
.st{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.st::after{content:'';flex:1;height:1px;background:var(--border)}

/* ROWS */
.row{background:var(--s);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;display:flex;align-items:center;gap:9px;margin-bottom:6px;transition:all .15s}
.row:active{background:var(--s2)}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;color:#fff}
.rb{flex:1;min-width:0}
.rn{font-size:12px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.rm{font-size:10px;color:var(--text3);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* BUTTONS */
.btn{padding:5px 10px;border-radius:18px;font-size:11px;font-weight:700;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.9);opacity:.8}
.btn.red{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.25)}
.btn.green{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.btn.blue{background:rgba(124,111,255,.15);color:var(--accent);border:1px solid var(--border2)}
.btn.gold{background:rgba(255,215,64,.15);color:var(--gold);border:1px solid rgba(255,215,64,.25)}
.btn.gray{background:var(--s3);color:var(--text2);border:1px solid var(--border)}

/* FULL BTN */
.fbtn{width:100%;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.fbtn:active{transform:scale(.97);opacity:.85}
.fbtn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.fbtn.danger{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.25)}
.fbtn.outline{background:var(--s2);color:var(--text);border:1px solid var(--border2)}

/* INPUT */
.inp{width:100%;padding:10px 12px;background:var(--s);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:13px;outline:none;direction:rtl;transition:border-color .15s;font-family:inherit;margin-bottom:8px}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,111,255,.15)}
textarea.inp{resize:none;height:80px;line-height:1.5}
select.inp{cursor:pointer}

/* SEARCH */
.srch{position:relative;margin-bottom:10px}
.srch-inp{width:100%;padding:9px 12px 9px 36px;background:var(--s);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:12px;outline:none;direction:rtl;transition:all .15s;font-family:inherit}
.srch-inp:focus{border-color:var(--accent)}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)}

/* BADGE */
.bdg{display:inline-block;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700;margin-right:3px}
.bdg.owner{background:rgba(255,215,64,.15);color:var(--gold);border:1px solid rgba(255,215,64,.25)}
.bdg.admin{background:rgba(124,111,255,.15);color:var(--accent);border:1px solid var(--border2)}
.bdg.banned{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.25)}
.bdg.pending{background:rgba(255,145,0,.15);color:var(--orange);border:1px solid rgba(255,145,0,.25)}

/* GROUP CARD */
.gc{background:var(--s);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 12px;margin-bottom:6px}
.gc-title{font-size:13px;font-weight:700;margin-bottom:3px}
.gc-meta{font-size:10px;color:var(--text3);display:flex;gap:10px}

/* TOP */
.ti{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--s);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:5px}
.trk{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.trk.g{background:rgba(255,215,64,.15);color:var(--gold)}
.trk.s{background:rgba(180,180,200,.1);color:#b4b4c8}
.trk.b{background:rgba(205,127,50,.1);color:#cd7f32}
.trk.n{background:var(--s3);color:var(--text3)}
.tb{flex:1;min-width:0}
.tt{font-size:12px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tm{font-size:10px;color:var(--text3)}
.tv{font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0}

/* BROADCAST */
.bc-wrap{background:var(--s);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.bc-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bc-result{padding:10px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;margin-top:8px;text-align:center}
.bc-result.ok{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.bc-result.err{background:rgba(255,82,82,.1);color:var(--red);border:1px solid rgba(255,82,82,.2)}
.bc-result.loading{background:rgba(124,111,255,.1);color:var(--accent);border:1px solid var(--border2)}

/* SPIN */
.spin{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:30px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s3);color:var(--text);padding:7px 14px;border-radius:18px;font-size:11px;font-weight:700;z-index:999;opacity:0;transition:all .22s;pointer-events:none;border:1px solid var(--border2);white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:rgba(0,230,118,.15);border-color:var(--green);color:var(--green)}
#toast.err{background:rgba(255,82,82,.15);border-color:var(--red);color:var(--red)}

.empty{text-align:center;padding:30px;color:var(--text3);font-size:12px}
.sep{height:1px;background:var(--border);margin:10px 0}
.nx{width:100%;padding:9px;background:var(--s2);border:1px solid var(--border);color:var(--text2);border-radius:var(--r-sm);font-size:11px;cursor:pointer;margin-top:6px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-logo">🛡️ لوحة الإدارة</div>
    <div id="hdr-badge"></div>
  </div>
  <div id="nav">
    <button class="nb on" onclick="T('stats')">📊 إحصائيات</button>
    <button class="nb" onclick="T('users')">👥 مستخدمون</button>
    <button class="nb" onclick="T('groups')">💬 مجموعات</button>
    <button class="nb" onclick="T('files')">📄 ملفات</button>
    <button class="nb" onclick="T('broadcast')">📢 بث</button>
    <button class="nb" onclick="T('reports')">🚩 بلاغات</button>
    <button class="nb" onclick="T('admins')">🔑 أدمنز</button>
    <button class="nb" onclick="T('top')">🏆 الأعلى</button>
  </div>
  <div id="pg"><div class="spin"></div></div>
</div>
<div id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
tg.setHeaderColor('#04040c');
tg.setBackgroundColor('#04040c');
const INIT_DATA = tg.initData || new URLSearchParams(window.location.search).get('initData') || '';

let _isOwner = false, _statsCache = null, _tab = 'stats';
let _uPage = 0, _uQ = '', _uT;

const $ = id => document.getElementById(id);
const API = {
  async call(path, method='GET', body=null) {
    const opts = { method, headers: { 'x-init-data': INIT_DATA, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch('/api' + path, opts);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  get: p => API.call(p),
  post: (p, b) => API.call(p, 'POST', b),
};
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }
let _tT;
function toast(m, t='') {
  clearTimeout(_tT);
  const el = $('toast');
  el.textContent = m; el.className = 'toast on ' + t;
  _tT = setTimeout(() => el.className = 'toast', 2600);
}
function pg(h) { $('pg').innerHTML = h; }
function spin() { pg('<div class="spin"></div>'); }

function T(tab) {
  _tab = tab;
  document.querySelectorAll('.nb').forEach((b,i) => b.classList.toggle('on', ['stats','users','groups','files','broadcast','reports','admins','top'][i] === tab));
  if (tab==='stats') loadStats();
  else if (tab==='users') loadUsers(true);
  else if (tab==='groups') loadGroups();
  else if (tab==='files') loadFiles();
  else if (tab==='broadcast') loadBroadcast();
  else if (tab==='reports') loadReports();
  else if (tab==='admins') loadAdmins();
  else if (tab==='top') loadTop();
}

async function init() {
  try {
    const res = await API.get('/admin/check');
    _isOwner = res.isOwner;
    $('hdr-badge').innerHTML = res.isOwner
      ? '<span class="hdr-badge owner">👑 المالك</span>'
      : '<span class="hdr-badge admin">🛡️ أدمن</span>';
    loadStats();
  } catch(e) {
    pg(`<div style="text-align:center;padding:60px 20px"><div style="font-size:44px;margin-bottom:12px">🚫</div><div style="font-size:15px;font-weight:700;color:#ff5252">غير مصرح لك</div><div style="font-size:11px;color:var(--text3);margin-top:6px">هذه اللوحة للمديرين فقط</div></div>`);
  }
}

async function loadStats() {
  spin();
  try {
    const d = await API.get('/admin/stats');
    _statsCache = d;
    pg(`
      <div class="sg">
        <div class="sc g"><div class="sv g">${d.users}</div><div class="sl">👥 مستخدم</div></div>
        <div class="sc a"><div class="sv a">${d.files}</div><div class="sl">📄 ملف</div></div>
        <div class="sc gold"><div class="sv gold">${d.downloads}</div><div class="sl">⬇️ تحميل</div></div>
        <div class="sc p"><div class="sv p">${d.favs}</div><div class="sl">⭐ مفضلة</div></div>
        <div class="sc b"><div class="sv b">${d.comments}</div><div class="sl">💬 تعليق</div></div>
        <div class="sc r"><div class="sv r">${d.banned}</div><div class="sl">🚫 محظور</div></div>
      </div>
      <div class="sg3">
        <div class="sc a"><div class="sv a" style="font-size:18px">${d.specs}</div><div class="sl">🎓 تخصص</div></div>
        <div class="sc o"><div class="sv o" style="font-size:18px">${d.admins}</div><div class="sl">🔑 أدمن</div></div>
        <div class="sc g"><div class="sv g" style="font-size:18px">${d.topFiles?.length||0}</div><div class="sl">🏆 الأعلى</div></div>
      </div>
      <div class="st">🆕 آخر المنضمين</div>
      ${d.recentUsers.map(u => `
        <div class="row">
          <div class="av" style="${u.is_banned?'background:rgba(255,82,82,.3)':''}">${(u.first_name||'?')[0].toUpperCase()}</div>
          <div class="rb">
            <div class="rn">${esc(u.first_name||'')} ${esc(u.last_name||'')} ${u.is_banned?'<span class="bdg banned">محظور</span>':''}</div>
            <div class="rm">${u.username?'@'+esc(u.username)+' · ':''}${u.id}</div>
          </div>
        </div>`).join('')}`);
  } catch(e) { pg(`<div class="empty">❌ خطأ في التحميل</div>`); }
}

function loadUsers(reset=true) {
  if (reset) { _uPage=0; _uQ=''; }
  pg(`
    <div class="srch"><span class="srch-ico">🔍</span><input class="srch-inp" id="usrQ" placeholder="ابحث بالاسم أو ID..." value="${esc(_uQ)}" oninput="onUQ(this.value)"></div>
    <div id="ulist"><div class="spin"></div></div>`);
  fetchUsers();
}

function onUQ(q) { _uQ=q; _uPage=0; clearTimeout(_uT); _uT=setTimeout(fetchUsers,400); }

async function fetchUsers() {
  const el = $('ulist');
  if (!el) return;
  el.innerHTML = '<div class="spin"></div>';
  try {
    const rows = await API.get(`/admin/users?q=${encodeURIComponent(_uQ)}&page=${_uPage}`);
    el.innerHTML = rows.length
      ? rows.map(u => `
        <div class="row">
          <div class="av" style="${u.is_banned?'background:rgba(255,82,82,.3)':''}">${(u.first_name||'?')[0].toUpperCase()}</div>
          <div class="rb">
            <div class="rn">${esc(u.first_name||'')} ${esc(u.last_name||'')} ${u.is_banned?'<span class="bdg banned">محظور</span>':''}</div>
            <div class="rm">${u.username?'@'+esc(u.username)+' · ':''}${u.id} · ${new Date(u.joined_at).toLocaleDateString('ar')}</div>
          </div>
          ${_isOwner?`<button class="btn ${u.is_banned?'green':'red'}" onclick="banU(${u.id},${!u.is_banned},this)">${u.is_banned?'✅ رفع':'🚫 حظر'}</button>`:''}
        </div>`).join('')
        + `<button class="nx" onclick="_uPage++;fetchUsers()">المزيد ›</button>`
      : '<div class="empty">لا نتائج</div>';
  } catch(e) { if($('ulist')) $('ulist').innerHTML='<div class="empty">❌ خطأ</div>'; }
}

async function banU(id, ban, btn) {
  btn.disabled=true; btn.textContent='...';
  try {
    await API.post(`/admin/ban/${id}`, { ban });
    toast(ban?'🚫 تم الحظر':'✅ رفع الحظر', ban?'err':'ok');
    tg.HapticFeedback.notificationOccurred(ban?'error':'success');
    btn.className=`btn ${ban?'green':'red'}`; btn.textContent=ban?'✅ رفع':'🚫 حظر';
    btn.onclick=()=>banU(id,!ban,btn);
  } catch(e) { toast('❌ خطأ','err'); }
  btn.disabled=false;
}

async function loadGroups() {
  spin();
  try {
    const rows = await API.get('/admin/groups');
    pg(rows.length ? `
      <div class="st">💬 المجموعات (${rows.length})</div>
      ${rows.map(g => `
        <div class="gc">
          <div class="gc-title">💬 ${esc(g.title||'بدون اسم')}</div>
          <div class="gc-meta">
            <span>👥 ${g.members||0} عضو</span>
            <span>🎓 ${esc(g.sp_name||'عام')}</span>
            <span>🔔 ${g.notify_new_files?'مفعّل':'موقوف'}</span>
          </div>
        </div>`).join('')}`
      : '<div class="empty">لا توجد مجموعات</div>');
  } catch(e) { pg('<div class="empty">❌ خطأ</div>'); }
}

async function loadFiles() {
  spin();
  try {
    const rows = await API.get('/admin/files');
    const ti = t => t==='link'?'🔗':t==='photo'?'🖼️':'📄';
    pg(rows.length ? rows.map(f => `
      <div class="row">
        <span style="font-size:20px;flex-shrink:0">${ti(f.file_type)}</span>
        <div class="rb">
          <div class="rn">${esc(f.title)}</div>
          <div class="rm">⬇️${f.downloads||0} · ${esc(f.cat_name||'')} · ${new Date(f.uploaded_at).toLocaleDateString('ar')}</div>
        </div>
        <button class="btn red" onclick="delF(${f.id},this)">🗑</button>
      </div>`).join('')
      : '<div class="empty">لا توجد ملفات</div>');
  } catch(e) { pg('<div class="empty">❌ خطأ</div>'); }
}

async function delF(id, btn) {
  btn.textContent='...'; btn.disabled=true;
  try {
    await API.post(`/admin/delfile/${id}`);
    toast('🗑 تم الحذف','ok');
    tg.HapticFeedback.notificationOccurred('warning');
    const row = btn.closest('.row');
    row.style.opacity='0.3'; row.style.pointerEvents='none';
  } catch(e) { toast('❌ خطأ','err'); btn.textContent='🗑'; btn.disabled=false; }
}

async function loadBroadcast() {
  let specs = [];
  try { specs = await API.get('/admin/specialties'); } catch(_) {}
  pg(`
    <div class="bc-wrap">
      <div class="bc-title">📢 بث للمستخدمين</div>
      <textarea class="inp" id="bcText" placeholder="اكتب رسالة البث... (يدعم Markdown)"></textarea>
      <div id="bcRes"></div>
      ${_isOwner ? `<button class="fbtn primary" onclick="sendBC('users')">📢 إرسال لجميع المستخدمين</button>` : '<div class="empty" style="padding:10px">⛔ للمالك فقط</div>'}
    </div>
    <div class="bc-wrap">
      <div class="bc-title">💬 بث للمجموعات</div>
      <textarea class="inp" id="bcGText" placeholder="رسالة للمجموعات..."></textarea>
      <select class="inp" id="bcSp">
        <option value="0">📢 جميع المجموعات</option>
        ${specs.map(s => `<option value="${s.id}">🎓 ${esc(s.name)}</option>`).join('')}
      </select>
      <div id="bcGRes"></div>
      ${_isOwner ? `<button class="fbtn outline" onclick="sendBC('groups')">💬 إرسال للمجموعات</button>` : ''}
    </div>`);
}

async function sendBC(target) {
  const txt = $(target==='users'?'bcText':'bcGText')?.value?.trim();
  const resEl = $(target==='users'?'bcRes':'bcGRes');
  const sp = $('bcSp')?.value || '0';
  if (!txt) { toast('اكتب رسالة أولاً','err'); return; }
  resEl.innerHTML = '<div class="bc-result loading">⏳ جاري الإرسال...</div>';
  try {
    const r = await API.post('/admin/broadcast', { text: txt, target, specialtyId: sp });
    resEl.innerHTML = `<div class="bc-result ok">✅ تم: ${r.sent} ناجح | ❌ ${r.failed} فاشل | المجموع: ${r.total}</div>`;
    toast(`✅ تم الإرسال: ${r.sent}`, 'ok');
    tg.HapticFeedback.notificationOccurred('success');
  } catch(e) {
    resEl.innerHTML = `<div class="bc-result err">❌ فشل: ${e.message}</div>`;
    toast('❌ خطأ في الإرسال','err');
  }
}

async function loadReports() {
  spin();
  try {
    const rows = await API.get('/admin/reports');
    pg(rows.length ? `
      <div class="st">🚩 البلاغات المعلقة (${rows.length})</div>
      ${rows.map(r => `
        <div class="row" style="flex-wrap:wrap;gap:6px">
          <div class="rb" style="flex-basis:100%">
            <div class="rn">📄 ${esc(r.file_title||'ملف محذوف')} <span class="bdg pending">معلق</span></div>
            <div class="rm">👤 ${esc(r.first_name||r.user_id)} · ${esc(r.reason||'بلاغ')} · ${new Date(r.created_at).toLocaleDateString('ar')}</div>
          </div>
          <button class="btn gold" onclick="resolveR(${r.id},'resolved',this)">✅ حل</button>
          <button class="btn red" onclick="resolveR(${r.id},'rejected',this)">❌ رفض</button>
        </div>`).join('')}`
      : '<div class="empty">🎉 لا توجد بلاغات معلقة</div>');
  } catch(e) { pg('<div class="empty">❌ خطأ</div>'); }
}

async function resolveR(id, status, btn) {
  btn.disabled=true; btn.textContent='...';
  try {
    await API.post(`/admin/report/${id}/resolve`, { status });
    toast(status==='resolved'?'✅ تم الحل':'❌ تم الرفض', status==='resolved'?'ok':'');
    tg.HapticFeedback.notificationOccurred('success');
    btn.closest('.row').style.opacity='0.4';
    btn.closest('.row').style.pointerEvents='none';
  } catch(e) { toast('❌ خطأ','err'); btn.disabled=false; btn.textContent=status==='resolved'?'✅ حل':'❌ رفض'; }
}

async function loadAdmins() {
  spin();
  try {
    const rows = await API.get('/admin/admins');
    pg(`
      <div class="st">🔑 المديرون (${rows.length})</div>
      ${rows.map(a => `
        <div class="row">
          <div class="av" style="background:linear-gradient(135deg,#7c6fff,#e040fb)">${(a.first_name||'?')[0].toUpperCase()}</div>
          <div class="rb">
            <div class="rn">${esc(a.first_name||'')} <span class="bdg admin">أدمن</span></div>
            <div class="rm">${a.username?'@'+esc(a.username)+' · ':''}${a.user_id}</div>
          </div>
          ${_isOwner?`<button class="btn red" onclick="removeAdm(${a.user_id},this)">🗑 إزالة</button>`:''}
        </div>`).join('')
      || '<div class="empty">لا يوجد مديرون</div>'}`);
  } catch(e) { pg('<div class="empty">❌ خطأ</div>'); }
}

async function removeAdm(id, btn) {
  btn.disabled=true; btn.textContent='...';
  try {
    await API.post(`/admin/removeadmin/${id}`);
    toast('🗑 تم إزالة الأدمن','ok');
    tg.HapticFeedback.notificationOccurred('warning');
    btn.closest('.row').style.opacity='0.3'; btn.closest('.row').style.pointerEvents='none';
  } catch(e) { toast('❌ خطأ','err'); btn.disabled=false; btn.textContent='🗑 إزالة'; }
}

async function loadTop() {
  if (!_statsCache) { spin(); try { _statsCache = await API.get('/admin/stats'); } catch(e) { pg('<div class="empty">❌ خطأ</div>'); return; } }
  const d = _statsCache;
  const rc = i => i===0?'g':i===1?'s':i===2?'b':'n';
  const ti = t => t==='link'?'🔗':t==='photo'?'🖼️':'📄';
  pg(`
    <div class="st">🏆 أكثر الملفات تحميلاً</div>
    ${d.topFiles.map((f,i) => `
      <div class="ti">
        <div class="trk ${rc(i)}">${i+1}</div>
        <span style="font-size:16px">${ti(f.file_type)}</span>
        <div class="tb"><div class="tt">${esc(f.title)}</div><div class="tm">#${f.id}</div></div>
        <div class="tv">⬇️${f.downloads||0}</div>
      </div>`).join('')}`);
}

init();
</script>
</body>
</html>
