<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🛡️ لوحة الإدارة</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#05050e;--s:#0d0d1e;--s2:#141428;--s3:#1c1c35;--s4:#22223f;
  --accent:#7c6fff;--accent2:#e040fb;--green:#00e676;--red:#ff5252;--gold:#ffd740;
  --text:#f0f0ff;--text2:#8888bb;--text3:#44446a;
  --border:rgba(255,255,255,.07);--border2:rgba(124,111,255,.3);
  --r:14px;--r-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
#root{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{flex-shrink:0;padding:12px 14px;background:rgba(5,5,14,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;backdrop-filter:blur(20px)}
#hdr-title{flex:1;font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#nav{flex-shrink:0;display:flex;background:var(--s);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);background:none;border:none;cursor:pointer;white-space:nowrap;letter-spacing:.5px;border-bottom:2px solid transparent;transition:all .2s}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
#content{flex:1;overflow-y:auto;padding:14px}
#content::-webkit-scrollbar{width:2px}
#content::-webkit-scrollbar-thumb{background:var(--s4)}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:16px}
.stat-box{background:var(--s);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.stat-box.green::before{background:var(--green)}
.stat-box.red::before{background:var(--red)}
.stat-box.gold::before{background:var(--gold)}
.stat-box.purple::before{background:var(--accent2)}
.stat-val{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px}
.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.gold{color:var(--gold)}.stat-val.purple{color:var(--accent2)}
.stat-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.user-row{background:var(--s);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.user-body{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.user-meta{font-size:10px;color:var(--text3);margin-top:2px}
.ban-btn{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;border:none;cursor:pointer;flex-shrink:0}
.ban-btn.ban{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.3)}
.ban-btn.unban{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.file-row{background:var(--s);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.file-icon{font-size:22px;flex-shrink:0}
.file-body{flex:1;min-width:0}
.file-title{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.file-meta{font-size:10px;color:var(--text3);margin-top:2px}
.del-btn{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid rgba(255,82,82,.3);background:rgba(255,82,82,.12);color:var(--red);cursor:pointer;flex-shrink:0}
.top-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px}
.top-rank{width:24px;height:24px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--text3);flex-shrink:0}
.top-rank.gold{background:rgba(255,215,64,.15);color:var(--gold)}
.top-rank.silver{background:rgba(180,180,200,.1);color:#b4b4c8}
.top-rank.bronze{background:rgba(205,127,50,.1);color:#cd7f32}
.top-body{flex:1;min-width:0}
.top-title{font-size:12px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.top-meta{font-size:10px;color:var(--text3)}
.top-val{font-size:14px;font-weight:800;color:var(--accent);flex-shrink:0}
.search-box{width:100%;padding:10px 13px;background:var(--s);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:13px;outline:none;margin-bottom:11px;direction:rtl;transition:border-color .15s;font-family:inherit}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,255,.15)}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:40px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);color:var(--text);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;border:1px solid var(--border2)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:rgba(0,230,118,.15);border-color:var(--green);color:var(--green)}
#toast.err{background:rgba(255,82,82,.15);border-color:var(--red);color:var(--red)}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.badge.owner{background:rgba(255,215,64,.15);color:var(--gold);border:1px solid rgba(255,215,64,.3)}
.badge.admin{background:rgba(124,111,255,.15);color:var(--accent);border:1px solid rgba(124,111,255,.3)}
.badge.banned{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.3)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.next-btn{width:100%;padding:10px;background:var(--s2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--r-sm);font-size:12px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div id="hdr-title">🛡️ لوحة الإدارة</div>
    <div id="admin-badge"></div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="showTab('stats')">📊 إحصائيات</button>
    <button class="nav-btn" onclick="showTab('users')">👥 مستخدمون</button>
    <button class="nav-btn" onclick="showTab('files')">📄 ملفات</button>
    <button class="nav-btn" onclick="showTab('top')">🏆 الأعلى</button>
  </div>
  <div id="content"><div class="spin"></div></div>
</div>
<div id="toast"></div>
<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
tg.setHeaderColor('#05050e');
tg.setBackgroundColor('#05050e');
const INIT_DATA = tg.initData || new URLSearchParams(window.location.search).get('initData') || '';
let _isOwner = false;
let _statsCache = null;
let _userPage = 0;
let _userSearch = '';
let _userSearchT;

const API = {
  async call(path, method='GET', body=null) {
    const opts = { method, headers: { 'x-init-data': INIT_DATA, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch('/api' + path, opts);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  get: p => API.call(p),
  post: (p, b) => API.call(p, 'POST', b),
};

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

let _toastT;
function toast(msg, type='') {
  clearTimeout(_toastT);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  _toastT = setTimeout(() => el.className = 'toast', 2500);
}

function setContent(html) { document.getElementById('content').innerHTML = html; }

function showTab(tab) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', ['stats','users','files','top'][i] === tab));
  if (tab==='stats') loadStats();
  else if (tab==='users') loadUsers();
  else if (tab==='files') loadFiles();
  else if (tab==='top') loadTop();
}

async function init() {
  try {
    const res = await API.get('/admin/check');
    _isOwner = res.isOwner;
    document.getElementById('admin-badge').innerHTML = res.isOwner
      ? '<span class="badge owner">👑 المالك</span>'
      : '<span class="badge admin">🛡️ أدمن</span>';
    loadStats();
  } catch(e) {
    setContent(`<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">🚫</div><div style="font-size:16px;font-weight:700;color:#ff5252">غير مصرح لك</div></div>`);
  }
}

async function loadStats() {
  setContent(`<div class="spin"></div>`);
  try {
    const d = await API.get('/admin/stats');
    _statsCache = d;
    setContent(`
      <div class="stat-grid">
        <div class="stat-box green"><div class="stat-val green">${d.users}</div><div class="stat-lbl">👥 مستخدم</div></div>
        <div class="stat-box"><div class="stat-val">${d.files}</div><div class="stat-lbl">📄 ملف</div></div>
        <div class="stat-box gold"><div class="stat-val gold">${d.downloads}</div><div class="stat-lbl">⬇️ تحميل</div></div>
        <div class="stat-box purple"><div class="stat-val purple">${d.favs}</div><div class="stat-lbl">⭐ مفضلة</div></div>
        <div class="stat-box"><div class="stat-val">${d.comments}</div><div class="stat-lbl">💬 تعليق</div></div>
        <div class="stat-box red"><div class="stat-val red">${d.banned}</div><div class="stat-lbl">🚫 محظور</div></div>
      </div>
      <div class="section-title">🆕 آخر المنضمين</div>
      ${d.recentUsers.map(u => `
        <div class="user-row">
          <div class="user-av">${(u.first_name||'?')[0].toUpperCase()}</div>
          <div class="user-body">
            <div class="user-name">${esc(u.first_name||'')} ${esc(u.last_name||'')} ${u.is_banned?'<span class="badge banned">محظور</span>':''}</div>
            <div class="user-meta">${u.username?'@'+esc(u.username)+' · ':''}${u.id}</div>
          </div>
        </div>`).join('')}`);
  } catch(e) { setContent(`<div class="empty">❌ خطأ في التحميل</div>`); }
}

function loadUsers(reset=true) {
  if (reset) { _userPage=0; _userSearch=''; }
  setContent(`
    <input class="search-box" id="userSearch" placeholder="🔍 ابحث بالاسم أو ID..." oninput="onUserSearch(this.value)">
    <div id="userList"><div class="spin"></div></div>`);
  fetchUsers();
}

function onUserSearch(q) {
  _userSearch = q; _userPage = 0;
  clearTimeout(_userSearchT);
  _userSearchT = setTimeout(fetchUsers, 400);
}

async function fetchUsers() {
  const list = document.getElementById('userList');
  if (!list) return;
  list.innerHTML = `<div class="spin"></div>`;
  try {
    const rows = await API.get(`/admin/users?q=${encodeURIComponent(_userSearch)}&page=${_userPage}`);
    list.innerHTML = rows.length
      ? rows.map(u => `
        <div class="user-row">
          <div class="user-av" style="${u.is_banned?'background:rgba(255,82,82,.3)':''}">${(u.first_name||'?')[0].toUpperCase()}</div>
          <div class="user-body">
            <div class="user-name">${esc(u.first_name||'')} ${esc(u.last_name||'')} ${u.is_banned?'<span class="badge banned">محظور</span>':''}</div>
            <div class="user-meta">${u.username?'@'+esc(u.username)+' · ':''}${u.id} · ${new Date(u.joined_at).toLocaleDateString('ar')}</div>
          </div>
          ${_isOwner?`<button class="ban-btn ${u.is_banned?'unban':'ban'}" onclick="banUser(${u.id},${!u.is_banned},this)">${u.is_banned?'✅ رفع':'🚫 حظر'}</button>`:''}
        </div>`).join('') + `<button class="next-btn" onclick="_userPage++;fetchUsers()">التالي ›</button>`
      : `<div class="empty">لا نتائج</div>`;
  } catch(e) { if(list) list.innerHTML=`<div class="empty">❌ خطأ</div>`; }
}

async function banUser(id, ban, btn) {
  btn.disabled = true; btn.textContent='...';
  try {
    await API.post(`/admin/ban/${id}`, { ban });
    toast(ban?'🚫 تم الحظر':'✅ تم رفع الحظر', ban?'err':'ok');
    tg.HapticFeedback.notificationOccurred(ban?'error':'success');
    btn.className=`ban-btn ${ban?'unban':'ban'}`;
    btn.textContent=ban?'✅ رفع':'🚫 حظر';
    btn.onclick=()=>banUser(id,!ban,btn);
  } catch(e) { toast('❌ خطأ','err'); }
  btn.disabled=false;
}

async function loadFiles() {
  setContent(`<div class="spin"></div>`);
  try {
    const rows = await API.get('/admin/files');
    const ti = t => t==='link'?'🔗':t==='photo'?'🖼️':'📄';
    setContent(rows.length
      ? rows.map(f => `
        <div class="file-row">
          <span class="file-icon">${ti(f.file_type)}</span>
          <div class="file-body">
            <div class="file-title">${esc(f.title)}</div>
            <div class="file-meta">⬇️${f.downloads||0} · ${esc(f.cat_name||'')} · ${new Date(f.uploaded_at).toLocaleDateString('ar')}</div>
          </div>
          <button class="del-btn" onclick="delFile(${f.id},this)">🗑</button>
        </div>`).join('')
      : `<div class="empty">لا توجد ملفات</div>`);
  } catch(e) { setContent(`<div class="empty">❌ خطأ</div>`); }
}

async function delFile(id, btn) {
  btn.textContent='...'; btn.disabled=true;
  try {
    await API.post(`/admin/delfile/${id}`);
    toast('🗑 تم الحذف','ok');
    tg.HapticFeedback.notificationOccurred('warning');
    const row = btn.closest('.file-row');
    row.style.opacity='0.3'; row.style.pointerEvents='none';
  } catch(e) { toast('❌ خطأ','err'); btn.textContent='🗑'; btn.disabled=false; }
}

async function loadTop() {
  setContent(`<div class="spin"></div>`);
  try {
    const d = _statsCache || await API.get('/admin/stats');
    _statsCache = d;
    const rc = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const ti = t => t==='link'?'🔗':t==='photo'?'🖼️':'📄';
    setContent(`
      <div class="section-title">🏆 أكثر الملفات تحميلاً</div>
      ${d.topFiles.map((f,i) => `
        <div class="top-item">
          <div class="top-rank ${rc(i)}">${i+1}</div>
          <span style="font-size:18px">${ti(f.file_type)}</span>
          <div class="top-body">
            <div class="top-title">${esc(f.title)}</div>
            <div class="top-meta">#${f.id}</div>
          </div>
          <div class="top-val">⬇️${f.downloads||0}</div>
        </div>`).join('')}`);
  } catch(e) { setContent(`<div class="empty">❌ خطأ</div>`); }
}

init();
</script>
</body>
</html>
