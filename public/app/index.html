<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>EduMaster</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a2e;
  --card2: #16213e;
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --gold: #f59e0b;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --border: #2d3748;
  --danger: #ef4444;
  --success: #10b981;
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
/* ── NAV ── */
.nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items:center; gap:12px;
}
.nav-back {
  width:36px; height:36px; border-radius:50%;
  background: var(--card); border:none;
  color: var(--text); font-size:18px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; flex-shrink:0;
}
.nav-back:active { transform:scale(.9); background:var(--accent); }
.nav-title { font-size:17px; font-weight:700; flex:1; }
.nav-search {
  width:36px; height:36px; border-radius:50%;
  background: var(--card); border:none;
  color: var(--text); font-size:16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s;
}
.nav-search:active { transform:scale(.9); }
/* ── PAGES ── */
.page {
  padding: 70px 16px 90px;
  min-height: 100vh;
  animation: fadeIn .25s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
/* ── BOTTOM TAB ── */
.tabs {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background: rgba(15,15,15,0.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab {
  flex:1; padding:10px 4px 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text2);
  font-size:10px; cursor:pointer; transition:.2s;
}
.tab.active { color:var(--accent); }
.tab-icon { font-size:22px; line-height:1; }
.tab:active { transform:scale(.9); }
/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, var(--card2) 0%, #0d1b2a 100%);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content:'';
  position:absolute; top:-50%; left:-50%;
  width:200%; height:200%;
  background: radial-gradient(circle, rgba(79,142,247,.08) 0%, transparent 60%);
  pointer-events:none;
}
.hero-greeting { font-size:13px; color:var(--text2); margin-bottom:4px; }
.hero-name { font-size:24px; font-weight:800; margin-bottom:4px; }
.hero-sp { font-size:13px; color:var(--accent); }
/* ── GRID CARDS ── */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.grid-1 { display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:12px; }
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 16px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .2s;
  display:flex; align-items:center; gap:12px;
  position: relative; overflow:hidden;
  -webkit-user-select:none;
}
.card:active { transform:scale(.96); background:var(--card2); }
.card-icon { font-size:26px; flex-shrink:0; }
.card-text { flex:1; min-width:0; }
.card-title { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.card-arrow { color:var(--text2); font-size:14px; flex-shrink:0; }
.card.accent-blue { border-color: rgba(79,142,247,.3); }
.card.accent-blue .card-icon { filter: drop-shadow(0 0 8px rgba(79,142,247,.5)); }
.card.accent-purple { border-color: rgba(124,58,237,.3); }
.card.accent-purple .card-icon { filter: drop-shadow(0 0 8px rgba(124,58,237,.5)); }
.card.accent-gold { border-color: rgba(245,158,11,.3); }
.card.accent-gold .card-icon { filter: drop-shadow(0 0 8px rgba(245,158,11,.5)); }
/* ── SECTION TITLE ── */
.section-title {
  font-size:13px; font-weight:700;
  color:var(--text2); text-transform:uppercase;
  letter-spacing:.5px; margin-bottom:10px; padding-right:4px;
}
/* ── SEARCH ── */
.search-box {
  position: relative; margin-bottom:16px;
}
.search-input {
  width:100%; padding:13px 16px 13px 44px;
  background: var(--card); border:1px solid var(--border);
  border-radius: var(--radius); color:var(--text);
  font-size:15px; outline:none;
  transition: border-color .2s;
  direction: rtl;
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:18px; color:var(--text2); pointer-events:none;
}
/* ── FILE CARD ── */
.file-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 14px;
  border: 1px solid var(--border);
  cursor:pointer; transition:.2s;
  display:flex; align-items:center; gap:12px;
}
.file-card:active { transform:scale(.97); }
.file-type-icon { font-size:24px; flex-shrink:0; }
.file-info { flex:1; min-width:0; }
.file-title { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-meta { font-size:11px; color:var(--text2); margin-top:3px; }
.file-fav { font-size:20px; padding:4px; }
/* ── BREADCRUMB ── */
.breadcrumb {
  display:flex; align-items:center; gap:6px;
  font-size:12px; color:var(--text2);
  margin-bottom:14px; flex-wrap:wrap;
}
.breadcrumb span { color:var(--accent); }
/* ── FILE PREVIEW ── */
.preview-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.preview-title { font-size:20px; font-weight:800; margin-bottom:8px; }
.preview-desc { font-size:13px; color:var(--text2); margin-bottom:16px; line-height:1.6; }
.preview-stats {
  display:flex; gap:20px; margin-bottom:16px;
  font-size:13px; color:var(--text2);
}
.preview-stat { display:flex; align-items:center; gap:5px; }
.stars { color:var(--gold); }
.btn-primary {
  width:100%; padding:16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border:none; border-radius: var(--radius);
  color:#fff; font-size:16px; font-weight:700;
  cursor:pointer; transition:.2s; margin-bottom:10px;
}
.btn-primary:active { transform:scale(.97); opacity:.9; }
.btn-secondary {
  width:100%; padding:14px;
  background: var(--card2); border:1px solid var(--border);
  border-radius: var(--radius);
  color:var(--text); font-size:14px; font-weight:600;
  cursor:pointer; transition:.2s;
}
.btn-secondary:active { transform:scale(.97); }
/* ── SPEC GRID ── */
.spec-card {
  background: linear-gradient(135deg, var(--card), var(--card2));
  border-radius: var(--radius);
  padding: 18px;
  border: 1px solid var(--border);
  cursor:pointer; transition:.2s;
  text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.spec-card:active { transform:scale(.95); }
.spec-card .icon { font-size:32px; }
.spec-card .name { font-size:13px; font-weight:700; }
/* ── LOADER ── */
.loader {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 20px; gap:16px; color:var(--text2);
}
.spinner {
  width:40px; height:40px;
  border:3px solid var(--border);
  border-top-color: var(--accent);
  border-radius:50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
/* ── EMPTY ── */
.empty {
  text-align:center; padding:60px 20px; color:var(--text2);
}
.empty-icon { font-size:48px; margin-bottom:12px; }
/* ── TOAST ── */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
  background: var(--success); color:#fff;
  padding:10px 20px; border-radius:20px;
  font-size:14px; font-weight:600;
  opacity:0; transition:.3s; pointer-events:none; white-space:nowrap;
  z-index:999;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.error { background: var(--danger); }
/* ── PROFILE ── */
.profile-avatar {
  width:80px; height:80px; border-radius:50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:32px; font-weight:800; margin:0 auto 16px;
  border:3px solid var(--border);
}
.profile-name { font-size:22px; font-weight:800; text-align:center; margin-bottom:4px; }
.profile-sp { font-size:13px; color:var(--accent); text-align:center; margin-bottom:20px; }
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.stat-card {
  background: var(--card); border-radius: var(--radius-sm);
  padding:16px; text-align:center; border:1px solid var(--border);
}
.stat-value { font-size:24px; font-weight:800; color:var(--accent); }
.stat-label { font-size:11px; color:var(--text2); margin-top:4px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- NAV -->
<div class="nav" id="nav">
  <button class="nav-back" id="navBack" onclick="goBack()" style="display:none">◀️</button>
  <div class="nav-title" id="navTitle">📚 EduMaster</div>
  <button class="nav-search" onclick="showPage('search')">🔍</button>
</div>

<!-- PAGES -->
<div id="app"></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-home" onclick="showPage('home')">
    <span class="tab-icon">🏠</span>الرئيسية
  </button>
  <button class="tab" id="tab-browse" onclick="showPage('browse')">
    <span class="tab-icon">📚</span>تصفح
  </button>
  <button class="tab" id="tab-search" onclick="showPage('search')">
    <span class="tab-icon">🔍</span>بحث
  </button>
  <button class="tab" id="tab-profile" onclick="showPage('profile')">
    <span class="tab-icon">👤</span>حسابي
  </button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.setHeaderColor('#0f0f0f');
tg.setBackgroundColor('#0f0f0f');

const initData = tg.initData;
const user = tg.initDataUnsafe?.user || {};

// ── State ──────────────────────────────────────────
const history = [];
let currentPage = 'home';
let profileData = null;

// ── API ────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = {
    method,
    headers: { 'x-init-data': initData, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Toast ─────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 2500);
}

// ── Navigation ────────────────────────────────────
function setTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + name);
  if (el) el.classList.add('active');
}

function setNavTitle(title, showBack=false) {
  document.getElementById('navTitle').textContent = title;
  document.getElementById('navBack').style.display = showBack ? 'flex' : 'none';
}

function pushHistory(page, args) {
  history.push({ page, args });
}

function goBack() {
  if (history.length > 0) {
    tg.HapticFeedback.impactOccurred('light');
    const prev = history.pop();
    showPageDirect(prev.page, prev.args, false);
  }
}

function showPage(page, args={}, addHistory=true) {
  tg.HapticFeedback.impactOccurred('light');
  if (addHistory && currentPage !== page) pushHistory(currentPage, {});
  showPageDirect(page, args, addHistory);
}

function showPageDirect(page, args={}, addHistory=true) {
  currentPage = page;
  if (['home','browse','search','profile'].includes(page)) {
    history.length = 0;
    setNavTitle(page==='home'?'📚 EduMaster':page==='browse'?'📚 تصفح':page==='search'?'🔍 بحث':'👤 حسابي', false);
    setTab(page);
  }
  const renders = {
    home: renderHome, browse: renderBrowse,
    search: renderSearch, profile: renderProfile,
    years: () => renderYears(args.spId, args.spName),
    semesters: () => renderSemesters(args.yrId, args.yrName, args.spId),
    subjects: () => renderSubjects(args.smId, args.smName, args.yrId, args.spId),
    categories: () => renderCategories(args.sbId, args.sbName, args.smId, args.yrId, args.spId),
    files: () => renderFiles(args.catId, args.catName),
    filePreview: () => renderFilePreview(args.fileId),
  };
  const fn = renders[page];
  if (fn) fn();
}

// ── Loader ────────────────────────────────────────
function setLoader() {
  document.getElementById('app').innerHTML = `
    <div class="page"><div class="loader">
      <div class="spinner"></div>
      <div>جاري التحميل...</div>
    </div></div>`;
}

// ── HOME ──────────────────────────────────────────
async function renderHome() {
  const hour = new Date().getHours();
  const greet = hour<12?'🌅 صباح النور':hour<17?'☀️ مساء الخير':'🌙 مساء النور';
  const name = user.first_name || 'طالب';

  let spName = '';
  try {
    if (!profileData) profileData = await api('/profile');
    spName = profileData.specialty?.name || '';
  } catch(_){}

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="hero">
      <div class="hero-greeting">${greet}</div>
      <div class="hero-name">${name} 👋</div>
      ${spName ? `<div class="hero-sp">🎓 ${spName}</div>` : ''}
    </div>

    <div class="section-title">الأقسام الرئيسية</div>
    <div class="grid-2">
      <div class="card accent-blue" onclick="showPage('browse')">
        <span class="card-icon">📚</span>
        <div class="card-text"><div class="card-title">تصفح</div><div class="card-sub">كل الملفات</div></div>
      </div>
      <div class="card accent-purple" onclick="showPage('search')">
        <span class="card-icon">🔍</span>
        <div class="card-text"><div class="card-title">بحث</div><div class="card-sub">ابحث سريع</div></div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card accent-gold" onclick="loadLatest()">
        <span class="card-icon">🆕</span>
        <div class="card-text"><div class="card-title">الجديد</div><div class="card-sub">آخر الملفات</div></div>
      </div>
      <div class="card" onclick="showPage('profile')">
        <span class="card-icon">👤</span>
        <div class="card-text"><div class="card-title">حسابي</div><div class="card-sub">إحصائياتي</div></div>
      </div>
    </div>
  </div>`;
}

// ── BROWSE ────────────────────────────────────────
async function renderBrowse() {
  setNavTitle('📚 اختر تخصصك', false);
  setLoader();
  try {
    const specs = await api('/specialties');
    const icons = ['💻','🏥','📐','⚗️','📊','🔬','⚙️','🎨','📖','🌍','🎓','🔭'];
    let rows = '';
    for (let i=0; i<specs.length; i+=2) {
      rows += '<div class="grid-2">';
      rows += `<div class="spec-card" onclick="showPage('years',{spId:${specs[i].id},spName:'${escHtml(specs[i].name)}'})">
        <div class="icon">${icons[i%icons.length]}</div>
        <div class="name">${escHtml(specs[i].name)}</div>
      </div>`;
      if (specs[i+1]) rows += `<div class="spec-card" onclick="showPage('years',{spId:${specs[i+1].id},spName:'${escHtml(specs[i+1].name)}'})">
        <div class="icon">${icons[(i+1)%icons.length]}</div>
        <div class="name">${escHtml(specs[i+1].name)}</div>
      </div>`;
      rows += '</div>';
    }
    document.getElementById('app').innerHTML = `<div class="page">${rows}</div>`;
  } catch(e) { showToast('خطأ في التحميل','error'); }
}

async function renderYears(spId, spName) {
  setNavTitle('📅 ' + spName, true);
  setLoader();
  try {
    const years = await api('/years/' + spId);
    let html = `<div class="page"><div class="breadcrumb">🎓 <span>${escHtml(spName)}</span></div><div class="grid-1">`;
    years.forEach(y => {
      html += `<div class="card" onclick="showPage('semesters',{yrId:${y.id},yrName:'${escHtml(y.name)}',spId:${spId}})">
        <span class="card-icon">📅</span>
        <div class="card-text"><div class="card-title">${escHtml(y.name)}</div></div>
        <span class="card-arrow">›</span></div>`;
    });
    html += '</div></div>';
    document.getElementById('app').innerHTML = html;
  } catch(e) { showToast('خطأ','error'); }
}

async function renderSemesters(yrId, yrName, spId) {
  setNavTitle('📆 ' + yrName, true);
  setLoader();
  try {
    const sems = await api('/semesters/' + yrId);
    let html = `<div class="page"><div class="grid-2">`;
    sems.forEach(s => {
      html += `<div class="spec-card" onclick="showPage('subjects',{smId:${s.id},smName:'${escHtml(s.name)}',yrId:${yrId},spId:${spId}})">
        <div class="icon">📆</div>
        <div class="name">${escHtml(s.name)}</div>
      </div>`;
    });
    html += '</div></div>';
    document.getElementById('app').innerHTML = html;
  } catch(e) { showToast('خطأ','error'); }
}

async function renderSubjects(smId, smName, yrId, spId) {
  setNavTitle('📖 ' + smName, true);
  setLoader();
  try {
    const subs = await api('/subjects/' + smId);
    let html = `<div class="page"><div class="grid-2">`;
    subs.forEach(s => {
      html += `<div class="spec-card" onclick="showPage('categories',{sbId:${s.id},sbName:'${escHtml(s.name)}',smId:${smId},yrId:${yrId},spId:${spId}})">
        <div class="icon">📖</div>
        <div class="name">${escHtml(s.name)}</div>
      </div>`;
    });
    html += '</div></div>';
    document.getElementById('app').innerHTML = html;
  } catch(e) { showToast('خطأ','error'); }
}

async function renderCategories(sbId, sbName, smId, yrId, spId) {
  setNavTitle('📁 ' + sbName, true);
  setLoader();
  try {
    const cats = await api('/categories/' + sbId);
    let html = `<div class="page"><div class="grid-2">`;
    const catIcons = {'cours':'📝','td':'✏️','tp':'🔬','exam':'📋','ds':'📝','correction':'✅'};
    cats.forEach(c => {
      const icon = Object.keys(catIcons).find(k => c.name.toLowerCase().includes(k));
      html += `<div class="spec-card" onclick="showPage('files',{catId:${c.id},catName:'${escHtml(c.name)}'})">
        <div class="icon">${catIcons[icon]||'📁'}</div>
        <div class="name">${escHtml(c.name)}</div>
      </div>`;
    });
    html += '</div></div>';
    document.getElementById('app').innerHTML = html;
  } catch(e) { showToast('خطأ','error'); }
}

async function renderFiles(catId, catName) {
  setNavTitle('📄 ' + catName, true);
  setLoader();
  try {
    const files = await api('/files/' + catId);
    renderFileList(files, catName);
  } catch(e) { showToast('خطأ','error'); }
}

function renderFileList(files, title='') {
  if (!files.length) {
    document.getElementById('app').innerHTML = `<div class="page"><div class="empty"><div class="empty-icon">📭</div><div>لا توجد ملفات</div></div></div>`;
    return;
  }
  const typeIcon = t => t==='link'?'🔗':t==='photo'?'🖼️':'📄';
  let html = `<div class="page"><div class="grid-1">`;
  files.forEach(f => {
    html += `<div class="file-card" onclick="showPage('filePreview',{fileId:${f.id}})">
      <span class="file-type-icon">${typeIcon(f.file_type)}</span>
      <div class="file-info">
        <div class="file-title">${escHtml(f.title)}</div>
        <div class="file-meta">📖 ${escHtml(f.sub_name||'')} · ⬇️ ${f.downloads||0}</div>
      </div>
      <span style="color:var(--text2);font-size:18px">›</span>
    </div>`;
  });
  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
}

async function loadLatest() {
  pushHistory('home', {});
  setNavTitle('🆕 آخر الملفات', true);
  setLoader();
  try {
    const files = await api('/latest');
    renderFileList(files, 'آخر الملفات');
  } catch(e) { showToast('خطأ','error'); }
}

// ── FILE PREVIEW ──────────────────────────────────
async function renderFilePreview(fileId) {
  setNavTitle('📄 ...', true);
  setLoader();
  try {
    const f = await api('/file/' + fileId);
    setNavTitle('📄 ' + f.title.substring(0,25), true);
    const stars = '⭐'.repeat(Math.round(f.rating?.avg||0)) + '☆'.repeat(5-Math.round(f.rating?.avg||0));
    document.getElementById('app').innerHTML = `
    <div class="page">
      <div class="preview-card">
        <div class="preview-title">${escHtml(f.title)}</div>
        ${f.description ? `<div class="preview-desc">${escHtml(f.description)}</div>` : ''}
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">
          📁 ${escHtml(f.cat_name||'')} | 📖 ${escHtml(f.sub_name||'')}
        </div>
        <div class="preview-stats">
          <span class="preview-stat">⬇️ ${f.downloads||0} تحميل</span>
          <span class="preview-stat stars">${stars}</span>
          <span class="preview-stat">💬 ${f.comments||0}</span>
        </div>
      </div>
      <button class="btn-primary" onclick="sendFile(${f.id})">
        ⬇️ تحميل الملف
      </button>
      <button class="btn-secondary" id="favBtn" onclick="toggleFav(${f.id},${f.fav})">
        ${f.fav ? '⭐ محفوظ' : '☆ حفظ في المفضلة'}
      </button>
    </div>`;
  } catch(e) { showToast('خطأ في تحميل الملف','error'); }
}

async function sendFile(fileId) {
  tg.HapticFeedback.notificationOccurred('success');
  showToast('⏳ جاري الإرسال...');
  try {
    await api('/send/' + fileId, 'POST');
    showToast('✅ تم الإرسال! افتح المحادثة مع البوت');
    tg.HapticFeedback.notificationOccurred('success');
  } catch(e) { showToast('❌ فشل الإرسال','error'); }
}

async function toggleFav(fileId, isFav) {
  try {
    const res = await api('/fav/' + fileId, 'POST');
    const btn = document.getElementById('favBtn');
    if (btn) btn.textContent = res.fav ? '⭐ محفوظ' : '☆ حفظ في المفضلة';
    showToast(res.fav ? '⭐ تمت الإضافة للمفضلة' : '🗑 تمت الإزالة');
    tg.HapticFeedback.impactOccurred('medium');
  } catch(e) { showToast('خطأ','error'); }
}

// ── SEARCH ────────────────────────────────────────
function renderSearch() {
  setNavTitle('🔍 بحث', false);
  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="search"
        placeholder="ابحث عن ملف..." autocomplete="off"
        oninput="doSearch(this.value)">
    </div>
    <div id="searchResults">
      <div class="empty"><div class="empty-icon">🔍</div><div>اكتب للبحث</div></div>
    </div>
  </div>`;
  setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
}

let searchTimer;
async function doSearch(q) {
  clearTimeout(searchTimer);
  if (q.length < 2) {
    document.getElementById('searchResults').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div>اكتب حرفين على الأقل</div></div>`;
    return;
  }
  searchTimer = setTimeout(async () => {
    document.getElementById('searchResults').innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
    try {
      const results = await api('/search?q=' + encodeURIComponent(q));
      if (!results.length) {
        document.getElementById('searchResults').innerHTML = `<div class="empty"><div class="empty-icon">😕</div><div>لا نتائج لـ "${escHtml(q)}"</div></div>`;
        return;
      }
      const typeIcon = t => t==='link'?'🔗':t==='photo'?'🖼️':'📄';
      let html = '<div class="grid-1">';
      results.forEach(f => {
        html += `<div class="file-card" onclick="showPage('filePreview',{fileId:${f.id}})">
          <span class="file-type-icon">${typeIcon(f.file_type)}</span>
          <div class="file-info">
            <div class="file-title">${escHtml(f.title)}</div>
            <div class="file-meta">📖 ${escHtml(f.sub_name||'')} · ⬇️ ${f.downloads||0}</div>
          </div>
          <span style="color:var(--text2);font-size:18px">›</span>
        </div>`;
      });
      html += '</div>';
      document.getElementById('searchResults').innerHTML = html;
    } catch(e) { document.getElementById('searchResults').innerHTML = `<div class="empty"><div>خطأ في البحث</div></div>`; }
  }, 400);
}

// ── PROFILE ───────────────────────────────────────
async function renderProfile() {
  setNavTitle('👤 حسابي', false);
  setLoader();
  try {
    if (!profileData) profileData = await api('/profile');
    const p = profileData;
    const initial = (p.user.first_name||'?')[0].toUpperCase();
    document.getElementById('app').innerHTML = `
    <div class="page">
      <div class="profile-avatar">${initial}</div>
      <div class="profile-name">${escHtml(p.user.first_name||'')} ${escHtml(p.user.last_name||'')}</div>
      ${p.user.username ? `<div style="text-align:center;color:var(--text2);margin-bottom:4px">@${p.user.username}</div>` : ''}
      <div class="profile-sp">🎓 ${p.specialty ? escHtml(p.specialty.name) : 'غير محدد'}</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${p.dlCount||0}</div><div class="stat-label">⬇️ تحميلات</div></div>
        <div class="stat-card"><div class="stat-value">${p.favCount||0}</div><div class="stat-label">⭐ مفضلة</div></div>
      </div>
    </div>`;
  } catch(e) { showToast('خطأ','error'); }
}

// ── Helpers ───────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ──────────────────────────────────────────
renderHome();
</script>
