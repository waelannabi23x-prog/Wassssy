<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EduMaster</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#07070f;--surface:#0f0f1c;--surface2:#161626;--surface3:#1e1e32;--surface4:#252540;
  --accent:#6c8fff;--accent2:#a78bfa;--accent-glow:rgba(108,143,255,.2);
  --gold:#fbbf24;--green:#34d399;--red:#f87171;--pink:#f472b6;
  --text:#eeeeff;--text2:#9999bb;--text3:#55557a;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--border3:rgba(108,143,255,.25);
  --r:16px;--r-sm:12px;--r-xs:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
#root{display:flex;flex-direction:column;height:100vh;height:100dvh}
#header{flex-shrink:0;z-index:50}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#footer{flex-shrink:0;z-index:50}
#content::-webkit-scrollbar{width:2px}
#content::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:2px}

.header-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(7,7,15,.97);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);min-height:54px}
.back-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:15px;cursor:pointer;transition:all .15s;flex-shrink:0}
.back-btn:active{background:var(--accent);transform:scale(.88)}
.back-btn.hidden{opacity:0;pointer-events:none}
.header-title{flex:1;font-size:15px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;letter-spacing:.2px}
.header-action{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.header-action:active{background:var(--accent);transform:scale(.88)}

.page{padding:14px 14px 24px;animation:pageIn .22s cubic-bezier(.4,0,.2,1)}
@keyframes pageIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
.page-back{animation:pageBack .22s cubic-bezier(.4,0,.2,1)}
@keyframes pageBack{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}

.tabs{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(7,7,15,.98);backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:5px 0 calc(5px + env(safe-area-inset-bottom))}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.3px;position:relative}
.tab-btn.active{color:var(--accent)}
.tab-btn.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--accent);border-radius:0 0 4px 4px}
.tab-icon{font-size:20px;line-height:1;transition:transform .15s}
.tab-btn.active .tab-icon{transform:translateY(-1px)}

.hero{background:linear-gradient(135deg,#12123a 0%,#0a0a1e 100%);border-radius:var(--r);padding:20px 18px;margin-bottom:14px;border:1px solid var(--border3);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;right:-20%;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(108,143,255,.15) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-60%;left:-10%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,.1) 0%,transparent 70%);pointer-events:none}
.hero-tag{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1.2px;margin-bottom:5px;text-transform:uppercase}
.hero-name{font-size:24px;font-weight:800;margin-bottom:4px;line-height:1.2}
.hero-sp{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;margin-top:4px}

.section{margin-bottom:18px}
.section-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.9px;text-transform:uppercase;margin-bottom:9px;padding-right:2px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g1{display:grid;gap:7px}

.menu-card{background:var(--surface);border-radius:var(--r);padding:16px 14px;border:1px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px;position:relative;overflow:hidden}
.menu-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}
.menu-card:active{transform:scale(.96);background:var(--surface2)}
.mc-icon{font-size:26px;flex-shrink:0}
.mc-body{flex:1;min-width:0}
.mc-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-sub{font-size:11px;color:var(--text2);margin-top:2px}
.mc-arrow{color:var(--text3);font-size:16px;flex-shrink:0}
.menu-card.blue{border-color:rgba(108,143,255,.2);background:linear-gradient(135deg,rgba(108,143,255,.07),var(--surface))}
.menu-card.purple{border-color:rgba(167,139,250,.2);background:linear-gradient(135deg,rgba(167,139,250,.07),var(--surface))}
.menu-card.gold{border-color:rgba(251,191,36,.2);background:linear-gradient(135deg,rgba(251,191,36,.07),var(--surface))}
.menu-card.green{border-color:rgba(52,211,153,.2);background:linear-gradient(135deg,rgba(52,211,153,.07),var(--surface))}
.menu-card.red{border-color:rgba(248,113,113,.2);background:linear-gradient(135deg,rgba(248,113,113,.07),var(--surface))}

.spec-card{background:var(--surface);border-radius:var(--r);padding:18px 10px;border:1px solid var(--border);cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px}
.spec-card:active{transform:scale(.94);background:var(--surface2)}
.spec-card .si{font-size:30px;line-height:1}
.spec-card .sn{font-size:11px;font-weight:700;line-height:1.3;color:var(--text)}
.spec-card.s0{border-color:rgba(108,143,255,.25)}
.spec-card.s1{border-color:rgba(167,139,250,.25)}
.spec-card.s2{border-color:rgba(251,191,36,.25)}
.spec-card.s3{border-color:rgba(52,211,153,.25)}
.spec-card.s4{border-color:rgba(248,113,113,.25)}
.spec-card.s5{border-color:rgba(244,114,182,.25)}

.list-item{background:var(--surface);border-radius:var(--r-sm);padding:13px 14px;border:1px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px}
.list-item:active{transform:scale(.97);background:var(--surface2)}
.li-icon{font-size:20px;flex-shrink:0}
.li-body{flex:1;min-width:0}
.li-title{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.li-sub{font-size:11px;color:var(--text2);margin-top:2px}
.li-arrow{color:var(--text3);font-size:18px;flex-shrink:0}

.file-card{background:var(--surface);border-radius:var(--r-sm);padding:13px 14px;border:1px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px}
.file-card:active{transform:scale(.97);background:var(--surface2)}
.fc-icon{font-size:24px;flex-shrink:0}
.fc-body{flex:1;min-width:0}
.fc-title{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.fc-meta{font-size:11px;color:var(--text2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.fc-arrow{color:var(--text3);font-size:16px;flex-shrink:0}

.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;padding:12px 14px 12px 44px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;transition:border-color .15s;direction:rtl}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3)}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--surface3);border:none;color:var(--text2);font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center}
.search-clear.show{display:flex}

.preview-hero{background:linear-gradient(135deg,var(--surface2),var(--surface));border-radius:var(--r);padding:20px 18px;border:1px solid var(--border2);margin-bottom:12px}
.prev-title{font-size:19px;font-weight:800;margin-bottom:8px;line-height:1.3}
.prev-desc{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.prev-path{font-size:11px;color:var(--text3);margin-bottom:12px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.prev-path span{color:var(--accent)}
.prev-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.prev-stat{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}

.stars-row{display:flex;gap:4px;margin-bottom:12px;align-items:center}
.star-btn{font-size:26px;cursor:pointer;transition:transform .1s;line-height:1;background:none;border:none;padding:2px}
.star-btn:active{transform:scale(1.3)}
.stars-label{font-size:12px;color:var(--text2);margin-right:6px}

.btn{width:100%;padding:14px;border-radius:var(--r);font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-fav{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-fav.active{background:rgba(251,191,36,.12);color:var(--gold);border-color:rgba(251,191,36,.3)}
.btn-comment{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}

.comments-section{margin-top:4px}
.comments-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.comments-title::after{content:'';flex:1;height:1px;background:var(--border)}
.comment-box{display:flex;gap:8px;margin-bottom:12px}
.comment-input{flex:1;padding:10px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:13px;outline:none;direction:rtl;resize:none;height:40px;transition:border-color .15s;font-family:inherit}
.comment-input:focus{border-color:var(--accent);height:70px}
.comment-send{width:38px;height:40px;border-radius:var(--r-sm);background:var(--accent);border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.comment-send:active{transform:scale(.9)}
.comment-item{background:var(--surface);border-radius:var(--r-sm);padding:11px 13px;border:1px solid var(--border);margin-bottom:7px}
.comment-author{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px}
.comment-text{font-size:13px;line-height:1.5;color:var(--text)}
.comment-time{font-size:10px;color:var(--text3);margin-top:4px}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-box{background:var(--surface);border-radius:var(--r-sm);padding:14px 10px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:24px;font-weight:800;color:var(--accent);line-height:1}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:4px}

.breadcrumb{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);margin-bottom:11px;flex-wrap:wrap;line-height:1.8}
.breadcrumb .sep{color:var(--text3)}
.breadcrumb .crumb{color:var(--text2)}
.breadcrumb .crumb:last-child{color:var(--accent);font-weight:600}

.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 12px;box-shadow:0 0 28px var(--accent-glow)}
.profile-name{font-size:20px;font-weight:800;text-align:center;margin-bottom:2px}
.profile-un{font-size:12px;color:var(--text2);text-align:center;margin-bottom:3px}
.profile-sp{font-size:12px;color:var(--accent);text-align:center;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:4px}

.fav-card{background:var(--surface);border-radius:var(--r-sm);padding:13px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:11px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.fav-card:active{transform:scale(.97)}
.fav-icon{font-size:22px;flex-shrink:0}
.fav-body{flex:1;min-width:0}
.fav-title{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.fav-meta{font-size:11px;color:var(--text2);margin-top:2px}
.fav-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:12px;color:var(--text2)}
.spin{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:12px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:9px;color:var(--text2);text-align:center}
.empty-icon{font-size:44px}
.empty-text{font-size:13px;font-weight:600}
.empty-sub{font-size:11px;color:var(--text3)}

#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface3);color:var(--text);padding:9px 18px;border-radius:22px;font-size:12px;font-weight:600;white-space:nowrap;z-index:999;border:1px solid var(--border2);opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:rgba(52,211,153,.18);border-color:var(--green);color:var(--green)}
#toast.err{background:rgba(248,113,113,.18);border-color:var(--red);color:var(--red)}

.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:0 5px;margin-right:3px}
</style>
</head>
<body>
<div id="root">
  <div id="header">
    <div class="header-bar">
      <button class="back-btn hidden" id="backBtn" onclick="NAV.back()">◀</button>
      <div class="header-title" id="headerTitle">📚 EduMaster</div>
      <button class="header-action" onclick="NAV.tab('search')">🔍</button>
    </div>
  </div>
  <div id="content"></div>
  <div id="footer">
    <div class="tabs">
      <button class="tab-btn active" id="tab-home" onclick="NAV.tab('home')">
        <span class="tab-icon">🏠</span>الرئيسية
      </button>
      <button class="tab-btn" id="tab-browse" onclick="NAV.tab('browse')">
        <span class="tab-icon">📚</span>تصفح
      </button>
      <button class="tab-btn" id="tab-search" onclick="NAV.tab('search')">
        <span class="tab-icon">🔍</span>بحث
      </button>
      <button class="tab-btn" id="tab-profile" onclick="NAV.tab('profile')">
        <span class="tab-icon">👤</span>حسابي
      </button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
tg.setHeaderColor('#07070f');
tg.setBackgroundColor('#07070f');
const TG_USER = tg.initDataUnsafe?.user || {};
const INIT_DATA = tg.initData;

const API = {
  async call(path, method='GET', body=null) {
    const opts = { method, headers: { 'x-init-data': INIT_DATA, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch('/api' + path, opts);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  get: p => API.call(p),
  post: (p, b) => API.call(p, 'POST', b),
};

const CACHE = {};
async function cached(key, fn, ttl=300000) {
  const now = Date.now();
  if (CACHE[key] && now - CACHE[key].ts < ttl) return CACHE[key].v;
  const v = await fn();
  CACHE[key] = { v, ts: now };
  return v;
}

const STACK = [];
let _currentTab = 'home';
let _isBack = false;

const NAV = {
  tab(name) {
    tg.HapticFeedback.selectionChanged();
    _currentTab = name;
    STACK.length = 0;
    _isBack = false;
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name)?.classList.add('active');
    const titles = { home: '📚 EduMaster', browse: '📚 تصفح', search: '🔍 بحث', profile: '👤 حسابي' };
    setHeader(titles[name] || name, false);
    PAGES[name]?.();
  },
  go(name, params={}, title='') {
    tg.HapticFeedback.impactOccurred('light');
    STACK.push({ name: STACK.length ? STACK[STACK.length-1].name : _currentTab, params: {}, title: document.getElementById('headerTitle').textContent });
    _isBack = false;
    if (title) setHeader(title, true);
    PAGES[name]?.(params);
  },
  back() {
    if (!STACK.length) return;
    tg.HapticFeedback.impactOccurred('light');
    const prev = STACK.pop();
    _isBack = true;
    setHeader(prev.title, STACK.length > 0);
    PAGES[prev.name]?.(prev.params);
  },
};

function setHeader(title, showBack) {
  document.getElementById('headerTitle').textContent = title;
  document.getElementById('backBtn').classList.toggle('hidden', !showBack);
}

function render(html) {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="page${_isBack ? ' page-back' : ''}">${html}</div>`;
  el.scrollTo(0, 0);
}

function loader() {
  render(`<div class="loader"><div class="spin"></div><div class="loader-text">جاري التحميل...</div></div>`);
}

function empty(icon='📭', text='لا يوجد محتوى', sub='') {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div>${sub ? `<div class="empty-sub">${sub}</div>` : ''}</div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}

let _toastT;
function toast(msg, type='') {
  clearTimeout(_toastT);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  _toastT = setTimeout(() => el.className = 'toast', 2400);
}

function starsHtml(avg, cnt) {
  const full = Math.round(avg || 0);
  let s = '';
  for (let i = 1; i <= 5; i++) s += `<span style="color:${i <= full ? '#fbbf24' : '#55557a'};font-size:18px">★</span>`;
  return `${s} <span style="font-size:11px;color:var(--text2)">(${cnt || 0})</span>`;
}

let _profile = null;

const PAGES = {
  async home() {
    const h = new Date().getHours();
    const greet = h < 12 ? '🌅 صباح النور' : h < 17 ? '☀️ مساء الخير' : '🌙 مساء النور';
    const name = TG_USER.first_name || 'طالب';
    let spName = '';
    try {
      if (!_profile) _profile = await cached('profile', () => API.get('/profile'), 120000);
      spName = _profile.specialty?.name || '';
    } catch(_) {}
    render(`
      <div class="hero">
        <div class="hero-tag">EduMaster Platform</div>
        <div class="hero-name">${greet}،<br>${esc(name)} 👋</div>
        ${spName ? `<div class="hero-sp">🎓 <span style="color:var(--accent)">${esc(spName)}</span></div>` : ''}
      </div>
      <div class="section">
        <div class="section-label">الرئيسية</div>
        <div class="g2">
          <div class="menu-card blue" onclick="NAV.tab('browse')">
            <span class="mc-icon">📚</span>
            <div class="mc-body"><div class="mc-title">تصفح</div><div class="mc-sub">كل الملفات</div></div>
          </div>
          <div class="menu-card purple" onclick="NAV.tab('search')">
            <span class="mc-icon">🔍</span>
            <div class="mc-body"><div class="mc-title">بحث</div><div class="mc-sub">ابحث بسرعة</div></div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-label">اكتشف</div>
        <div class="g1">
          <div class="menu-card gold" onclick="loadLatest()">
            <span class="mc-icon">🆕</span>

  async categories({ sbId, sbName, smId, smName, yrId, yrName, spId, spName }) {
    loader();

    try {
      const cats = await cached('cats_' + sbId, () => API.get('/categories/' + sbId), 3600000);
      const catIcon = n => {
        n = n.toLowerCase();
        if (n.includes('cours')) return '📝';
        if (n.includes('td') || n.includes('serie')) return '✏️';
        if (n.includes('tp')) return '🔬';
        if (n.includes('exam') || n.includes('ds')) return '📋';
        if (n.includes('corr')) return '✅';
        return '📁';
      };
      let rows = '';
      for (let i = 0; i < cats.length; i += 2) {
        const p1 = { catId: cats[i].id, catName: esc(cats[i].name), sbId, sbName: esc(sbName), smId, smName: esc(smName), yrId, yrName: esc(yrName), spId, spName: esc(spName) };
        rows += '<div class="g2">';
        rows += `<div class="spec-card s${i%6}" onclick='NAV.go("files",${JSON.stringify(p1)},"📄 ${esc(cats[i].name)}")'><div class="si">${catIcon(cats[i].name)}</div><div class="sn">${esc(cats[i].name)}</div></div>`;
        if (cats[i + 1]) {

        ${rows || empty()}`);

  async preview({ fileId }) {

        <div class="preview-hero">
          <div class="prev-title">${esc(f.title)}</div>
          ${f.description ? `<div class="prev-desc">${esc(f.description)}</div>` : ''}

async function sendFile(fileId, btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = '⏳ جاري الإرسال...';
  btn.disabled = true;
  try {
    await API.post('/send/' + fileId);
    toast('✅ تم الإرسال! افتح المحادثة مع البوت', 'ok');
    tg.HapticFeedback.notificationOccurred('success');
    btn.innerHTML = '✅ تم الإرسال!';
    setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 3000);
  } catch(e) {
    toast('❌ فشل الإرسال', 'err');
    btn.innerHTML = orig;
    btn.disabled = false;
  }
}

async function toggleFav(fileId, isFav) {
  tg.HapticFeedback.impactOccurred('medium');
  try {
    const res = await API.post('/fav/' + fileId);
    const btn = document.getElementById('favBtn_' + fileId);
    if (btn) {
      btn.classList.toggle('active', res.fav);
      btn.textContent = res.fav ? '⭐ محفوظ في المفضلة' : '☆ حفظ في المفضلة';
    }
    toast(res.fav ? '⭐ أُضيف للمفضلة' : '🗑 حُذف من المفضلة', res.fav ? 'ok' : '');
    delete CACHE['profile'];
  } catch(e) { toast('خطأ', 'err'); }
}

async function rateFile(fileId, rating, oldRating) {
  try {
    const res = await API.post('/rate/' + fileId, { rating });
    tg.HapticFeedback.notificationOccurred('success');
    toast('✅ تم تقييمك: ' + '★'.repeat(rating), 'ok');
    for (let i = 1; i <= 5; i++) {
      const s = document.getElementById('star_' + fileId + '_' + i);
      if (s) s.style.color = i <= rating ? '#fbbf24' : '#55557a';
    }
  } catch(e) { toast('خطأ في التقييم', 'err'); }
}

async function sendComment(fileId) {
  const inp = document.getElementById('cmtInput_' + fileId);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) { toast('اكتب تعليقاً أولاً', 'err'); return; }
  try {
    await API.post('/comment/' + fileId, { text });
    toast('✅ تم إرسال تعليقك', 'ok');
    inp.value = '';
    tg.HapticFeedback.notificationOccurred('success');
    const list = document.getElementById('commentsList_' + fileId);
    if (list) {
      const div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = `<div class="comment-author">👤 ${esc(TG_USER.first_name || 'أنت')}</div><div class="comment-text">${esc(text)}</div><div class="comment-time">الآن</div>`;
      list.prepend(div);
    }
    delete CACHE['profile'];
  } catch(e) { toast('خطأ في إرسال التعليق', 'err'); }
}

let _st;
function doSearch(q) {
  const sc = document.getElementById('sc');
  if (sc) sc.classList.toggle('show', q.length > 0);
  clearTimeout(_st);
  if (q.length < 2) {
    document.getElementById('sr').innerHTML = empty('🔍', 'اكتب حرفين على الأقل');
    return;
  }
  document.getElementById('sr').innerHTML = `<div class="loader"><div class="spin"></div></div>`;
  _st = setTimeout(async () => {
    try {
      const res = await API.get('/search?q=' + encodeURIComponent(q));
      const typeIcon = t => t === 'link' ? '🔗' : t === 'photo' ? '🖼️' : '📄';
      if (!res.length) {
        document.getElementById('sr').innerHTML = empty('😕', `لا نتائج لـ "${esc(q)}"`, 'جرب: algo · td · exam · cours');
        return;
      }
      document.getElementById('sr').innerHTML = `<div class="g1">${res.map(f => `
        <div class="file-card" onclick='NAV.go("preview",{fileId:${f.id}},"📄 ${esc(f.title.substring(0,25))}")'>
          <span class="fc-icon">${typeIcon(f.file_type)}</span>
          <div class="fc-body">
            <div class="fc-title">${esc(f.title)}</div>
            <div class="fc-meta"><span>📖 ${esc(f.subject_name || '')}</span><span>⬇️ ${f.downloads || 0}</span></div>
          </div>
          <span class="fc-arrow">›</span>
        </div>`).join('')}</div>`;
    } catch(e) {
      document.getElementById('sr').innerHTML = empty('❌', 'خطأ في البحث');
    }
  }, 350);
}

function clearSearch() {
  const si = document.getElementById('si');
  if (si) { si.value = ''; si.focus(); }
  document.getElementById('sc')?.classList.remove('show');
  document.getElementById('sr').innerHTML = empty('🔍', 'ابحث عن أي ملف', 'algo · serie · td · exam · cours...');
}
