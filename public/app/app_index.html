<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>EduMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#03040a;--bg1:#070912;--bg2:#0c0e1a;--bg3:#111420;--bg4:#161926;
  --gold:#f5c842;--gold2:#d4a820;--goldf:rgba(245,200,66,.1);--goldg:rgba(245,200,66,.25);
  --jade:#00f0a0;--jade2:#00c880;--jadef:rgba(0,240,160,.08);--jadeg:rgba(0,240,160,.2);
  --purple:#a855f7;--purplef:rgba(168,85,247,.1);--purpleg:rgba(168,85,247,.2);
  --blue:#3b82f6;--bluef:rgba(59,130,246,.1);
  --rose:#f43f5e;--rosef:rgba(244,63,94,.1);
  --t0:#f0f0ff;--t1:#b0b0d0;--t2:#6060a0;--t3:#303060;
  --ln:rgba(255,255,255,.04);--ln2:rgba(255,255,255,.08);--ln3:rgba(255,255,255,.12);
  --r1:20px;--r2:16px;--r3:12px;--r4:8px;
  --ff:'Cairo',sans-serif;--fm:'Orbitron',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t0);font-family:var(--ff)}
#root{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden}

/* ── AURORA BG ── */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora-a{position:absolute;top:-40%;right:-20%;width:80vw;height:80vw;border-radius:50%;background:radial-gradient(circle,rgba(0,240,160,.06) 0%,transparent 60%);animation:aurA 20s ease-in-out infinite alternate}
.aurora-b{position:absolute;bottom:-40%;left:-20%;width:70vw;height:70vw;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.05) 0%,transparent 60%);animation:aurB 26s ease-in-out infinite alternate}
.aurora-c{position:absolute;top:30%;left:10%;width:50vw;height:50vw;border-radius:50%;background:radial-gradient(circle,rgba(245,200,66,.03) 0%,transparent 60%);animation:aurC 18s ease-in-out infinite alternate}
@keyframes aurA{to{transform:translate(10%,15%) scale(1.3)}}
@keyframes aurB{to{transform:translate(-8%,-10%) scale(1.2)}}
@keyframes aurC{to{transform:translate(5%,-8%) scale(1.15)}}

/* ── GRID TEXTURE ── */
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* ── HEADER ── */
#hdr{flex-shrink:0;z-index:60;position:relative}
.hbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(3,4,10,.9);backdrop-filter:blur(40px);border-bottom:1px solid var(--ln2);min-height:56px;position:relative}
.hbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--jade) 25%,var(--purple) 75%,transparent);opacity:.4}
.hback{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:1px solid var(--ln2);color:var(--t0);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.hback:active{background:var(--jade);color:#000;transform:scale(.88)}
.hback.off{opacity:0;pointer-events:none}
.hlogo{display:flex;align-items:center;gap:9px;flex:1}
.hmark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--jade),var(--jade2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000;flex-shrink:0;box-shadow:0 0 16px var(--jadeg)}
.hname{font-size:16px;font-weight:900;letter-spacing:.5px;font-family:var(--fm);background:linear-gradient(90deg,var(--jade),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.htitle{flex:1;font-size:13px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:none}
.hacts{display:flex;gap:6px}
.hbtn{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:1px solid var(--ln2);color:var(--t0);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
.hbtn:active{transform:scale(.88)}
.hbtn .ndot{position:absolute;top:5px;left:5px;width:7px;height:7px;border-radius:50%;background:var(--rose);border:2px solid var(--bg);display:none}
.hbtn .ndot.on{display:block}

/* ── CONTENT ── */
#cnt{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;z-index:1;position:relative;scroll-behavior:smooth}
#cnt::-webkit-scrollbar{width:2px}
#cnt::-webkit-scrollbar-thumb{background:var(--bg4)}

/* ── PAGES ── */
.pg{padding:14px 13px 100px;animation:pgIn .25s cubic-bezier(.4,0,.2,1)}
.pg.bk{animation:pgBk .25s cubic-bezier(.4,0,.2,1)}
@keyframes pgIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
@keyframes pgBk{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}

/* ── BOTTOM NAV ── */
#nav{flex-shrink:0;z-index:60;position:relative}
.nbar{display:grid;background:rgba(3,4,10,.95);backdrop-filter:blur(40px);border-top:1px solid var(--ln2);padding:6px 8px calc(6px + env(safe-area-inset-bottom));position:relative}
.nbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--jade) 30%,var(--purple) 70%,transparent);opacity:.3}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;background:none;border:none;color:var(--t3);font-family:var(--ff);font-size:9px;font-weight:700;cursor:pointer;transition:all .2s;position:relative;border-radius:12px;letter-spacing:.3px}
.nb.on{color:var(--jade)}
.nbbar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:22px;height:2px;background:linear-gradient(90deg,var(--jade),var(--purple));border-radius:0 0 3px 3px;opacity:0;transition:opacity .2s}
.nb.on .nbbar{opacity:1}
.nbico{font-size:20px;line-height:1;transition:transform .18s}
.nb.on .nbico{transform:translateY(-2px) scale(1.1)}
.nnotif{position:absolute;top:2px;left:50%;margin-left:8px;width:7px;height:7px;border-radius:50%;background:var(--rose);border:2px solid var(--bg);display:none}
.nnotif.on{display:block}

/* ════ COMPONENTS ════ */

/* LOADER */
.ldr{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:14px}
.spin{width:28px;height:28px;border:2px solid var(--ln2);border-top-color:var(--jade);border-radius:50%;animation:spin .7s linear infinite}
.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r3)}
.skel-row{height:72px;margin-bottom:9px}

/* HERO */
.hero{background:linear-gradient(135deg,rgba(0,240,160,.07),rgba(7,9,18,.9) 50%,rgba(168,85,247,.06));border:1px solid rgba(0,240,160,.15);border-radius:var(--r1);padding:22px 18px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;right:-15%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--jadeg) 0%,transparent 70%);pointer-events:none;animation:float 6s ease-in-out infinite}
.hero-tag{font-size:9px;font-weight:800;color:var(--jade);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;opacity:.8}
.hero-h{font-size:24px;font-weight:900;line-height:1.2;margin-bottom:8px}
.hero-h b{background:linear-gradient(90deg,var(--jade),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* XP BAR */
.xpw{background:rgba(255,255,255,.05);border-radius:3px;height:4px;overflow:hidden;margin-top:12px;position:relative}
.xpf{height:100%;background:linear-gradient(90deg,var(--jade),var(--purple));border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.xpf::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s infinite}

/* LEVEL BADGE */
.lvbg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800}
.lv0{background:rgba(100,100,140,.1);color:var(--t2);border:1px solid var(--ln2)}
.lv1{background:var(--bluef);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.lv2{background:var(--jadef);color:var(--jade);border:1px solid rgba(0,240,160,.2)}
.lv3{background:var(--purplef);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.lv4{background:var(--goldf);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.lv5{background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(244,63,94,.1));color:var(--gold);border:1px solid rgba(245,200,66,.3);animation:ownerPulse 2.5s infinite}
@keyframes ownerPulse{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 0 4px rgba(245,200,66,.1)}}

/* STAT ROW */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sp{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r2);padding:14px 8px;text-align:center;position:relative;overflow:hidden;transition:transform .15s;cursor:pointer}
.sp:active{transform:scale(.92)}
.sp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sp.jade::before{background:var(--jade)}.sp.gold::before{background:var(--gold)}.sp.purple::before{background:var(--purple)}.sp.rose::before{background:var(--rose)}.sp.blue::before{background:var(--blue)}
.sp-v{font-size:22px;font-weight:900;line-height:1;margin-bottom:2px;font-family:var(--fm)}
.sp.jade .sp-v{color:var(--jade)}.sp.gold .sp-v{color:var(--gold)}.sp.purple .sp-v{color:var(--purple)}.sp.rose .sp-v{color:var(--rose)}.sp.blue .sp-v{color:var(--blue)}
.sp-l{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.8px;text-transform:uppercase}

/* SECTION HEADER */
.sh{font-size:9px;font-weight:800;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--ln2),transparent)}
.sh-link{font-size:10px;color:var(--jade);font-weight:700;cursor:pointer;margin-right:auto;margin-left:0}

/* CARD */
.cd{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r2);position:relative;overflow:hidden;cursor:pointer;transition:all .18s}
.cd::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}
.cd:active{transform:scale(.97)}
.cd.jade{border-color:rgba(0,240,160,.2);background:linear-gradient(135deg,rgba(0,240,160,.04),var(--bg2))}
.cd.gold{border-color:rgba(245,200,66,.25);background:linear-gradient(135deg,rgba(245,200,66,.06),var(--bg2))}
.cd.purple{border-color:rgba(168,85,247,.2);background:linear-gradient(135deg,rgba(168,85,247,.04),var(--bg2))}

/* ── BUNDLE CARD (بارز جداً) ── */
.bundle-card{background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(168,85,247,.06),var(--bg2));border:1px solid rgba(245,200,66,.3);border-radius:var(--r1);margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.bundle-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,200,66,.05),transparent 60%);pointer-events:none}
.bundle-card::after{content:'📦';position:absolute;top:-8px;left:-8px;font-size:60px;opacity:.05;pointer-events:none}
.bundle-card:active{transform:scale(.97)}
.bundle-card-inner{padding:16px 14px;display:flex;align-items:center;gap:12px}
.bundle-ico{width:52px;height:52px;border-radius:var(--r2);background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 6px 20px var(--goldg);animation:float 4s ease-in-out infinite}
.bundle-body{flex:1;min-width:0}
.bundle-title{font-size:14px;font-weight:800;margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bundle-meta{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:8px}
.bundle-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.bundle-arr{color:var(--gold);font-size:18px}
.bundle-section-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.bundle-section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(245,200,66,.3),transparent)}

/* MENU CARD */
.mc{padding:14px 13px;display:flex;align-items:center;gap:12px}
.mci{width:44px;height:44px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mci.jade{background:var(--jadef)}.mci.gold{background:var(--goldf)}.mci.purple{background:var(--purplef)}.mci.rose{background:var(--rosef)}.mci.blue{background:var(--bluef)}
.mcb{flex:1;min-width:0}
.mct{font-size:13px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.mcs{font-size:11px;color:var(--t2);margin-top:2px}
.mca{color:var(--t3);font-size:18px;flex-shrink:0}

/* SPEC GRID */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.sc{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r2);padding:20px 12px;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.sc.v0::after{background:var(--jade)}.sc.v1::after{background:var(--gold)}.sc.v2::after{background:var(--purple)}.sc.v3::after{background:var(--rose)}.sc.v4::after{background:var(--blue)}.sc.v5::after{background:var(--jade)}
.sc.v0{border-color:rgba(0,240,160,.2)}.sc.v1{border-color:rgba(245,200,66,.2)}.sc.v2{border-color:rgba(168,85,247,.2)}.sc.v3{border-color:rgba(244,63,94,.2)}.sc.v4{border-color:rgba(59,130,246,.2)}
.sc:active{transform:scale(.93)}
.sc-ico{font-size:30px;line-height:1}
.sc-nm{font-size:11px;font-weight:700;line-height:1.4}

/* FILE CARD */
.fc{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r3);padding:12px 13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px;margin-bottom:7px;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.015),transparent);pointer-events:none}
.fc:active{transform:scale(.97);background:var(--bg3)}
.fci{width:40px;height:40px;border-radius:var(--r4);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.fci.doc{background:var(--jadef)}.fci.img{background:var(--bluef)}.fci.lnk{background:var(--goldf)}.fci.vid{background:var(--rosef)}
.fcb{flex:1;min-width:0}
.fct{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:4px}
.fcm{display:flex;align-items:center;gap:6px}
.fctg{font-size:10px;color:var(--t2)}
.fca{color:var(--t3);font-size:16px}

/* TRENDING SCROLL */
.tscroll{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tscroll::-webkit-scrollbar{display:none}
.tc{flex-shrink:0;width:145px;background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r2);padding:14px 12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.tc:active{transform:scale(.95)}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.tc.v0::before{background:var(--jade)}.tc.v1::before{background:var(--gold)}.tc.v2::before{background:var(--purple)}.tc.v3::before{background:var(--rose)}.tc.v4::before{background:var(--blue)}
.tc-ico{font-size:26px;margin-bottom:8px}
.tc-t{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tc-m{font-size:10px;color:var(--t2)}

/* ── OWNER PROFILE (مميز جداً) ── */
.owner-hero{position:relative;background:linear-gradient(160deg,rgba(245,200,66,.12),rgba(168,85,247,.08),rgba(3,4,10,.95));border:1px solid rgba(245,200,66,.4);border-radius:var(--r1);padding:28px 20px;margin-bottom:14px;text-align:center;overflow:hidden}
.owner-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,200,66,.12) 0%,transparent 60%)}
.owner-hero::after{content:'';position:absolute;inset:0;border-radius:var(--r1);background:linear-gradient(135deg,rgba(245,200,66,.08),transparent,rgba(168,85,247,.06));animation:ownerShimmer 4s ease-in-out infinite alternate}
@keyframes ownerShimmer{from{opacity:.5}to{opacity:1}}
.owner-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.owner-star{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--gold);animation:starFloat linear infinite}
@keyframes starFloat{0%{opacity:0;transform:translateY(0)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateY(-100px)}}
.owner-crown{font-size:34px;margin-bottom:6px;display:block;animation:crownFloat 3s ease-in-out infinite;position:relative;z-index:1;filter:drop-shadow(0 0 12px rgba(245,200,66,.6))}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
.owner-av{width:90px;height:90px;border-radius:50%;margin:0 auto 12px;position:relative;z-index:1}
.owner-av-inner{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#000;background:linear-gradient(135deg,var(--gold),var(--gold2));box-shadow:0 0 0 3px rgba(245,200,66,.3),0 0 0 6px rgba(245,200,66,.1),0 0 40px rgba(245,200,66,.3)}
.owner-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid transparent;background:linear-gradient(var(--bg),var(--bg)) padding-box,linear-gradient(135deg,var(--gold),var(--purple),var(--jade)) border-box;animation:ownerRing 3s linear infinite}
@keyframes ownerRing{to{transform:rotate(360deg)}}
.owner-name{font-size:22px;font-weight:900;position:relative;z-index:1;margin-bottom:4px;background:linear-gradient(90deg,var(--gold),#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:goldShine 3s linear infinite}
@keyframes goldShine{to{background-position:-200%}}
.owner-title{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:800;background:linear-gradient(135deg,rgba(245,200,66,.2),rgba(168,85,247,.15));border:1px solid rgba(245,200,66,.3);color:var(--gold);position:relative;z-index:1}

/* NORMAL PROFILE */
.prof-hero{background:linear-gradient(160deg,rgba(0,240,160,.08),var(--bg2) 60%,rgba(168,85,247,.05));border:1px solid rgba(0,240,160,.15);border-radius:var(--r1);padding:24px 18px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.prof-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,240,160,.08) 0%,transparent 65%)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;margin:0 auto 12px;position:relative;z-index:1;cursor:pointer;transition:transform .2s;flex-shrink:0}
.av:active{transform:scale(.92)}
.av-lg{width:78px;height:78px;font-size:30px;box-shadow:0 0 0 3px var(--jadef),0 0 0 6px rgba(0,240,160,.05),0 8px 30px var(--jadeg)}
.av-md{width:40px;height:40px;font-size:16px}
.av-sm{width:34px;height:34px;font-size:13px}
.prof-name{font-size:20px;font-weight:800;margin-bottom:3px;position:relative;z-index:1}
.prof-un{font-size:12px;color:var(--jade);font-weight:600;position:relative;z-index:1}
.prof-sp{font-size:11px;color:var(--t2);display:inline-flex;align-items:center;gap:4px;background:var(--bg3);padding:4px 12px;border-radius:20px;margin-top:6px;position:relative;z-index:1}

/* BADGES */
.bdgs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.bdg{display:flex;flex-direction:column;align-items:center;gap:3px;width:56px}
.bdg-ico{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;border:2px solid var(--ln2);transition:all .2s}
.bdg-ico.on{border-color:var(--gold);box-shadow:0 0 14px var(--goldg)}
.bdg-ico.off{filter:grayscale(1);opacity:.2}
.bdg-nm{font-size:9px;font-weight:700;color:var(--t2);text-align:center;line-height:1.2}

/* LEADERBOARD */
.lbr{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r3);padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px;transition:all .15s;cursor:pointer}
.lbr:active{background:var(--bg3)}
.lbrank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.r1{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.r2{background:linear-gradient(135deg,#a0a0c0,#606080);color:#fff}
.r3c{background:linear-gradient(135deg,#c08040,#906030);color:#000}
.rn{background:var(--bg3);color:var(--t2)}
.lbxp{font-size:13px;font-weight:900;color:var(--gold);flex-shrink:0;font-family:var(--fm)}

/* PREVIEW */
.pvhero{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid rgba(0,240,160,.15);border-radius:var(--r1);padding:22px 18px;margin-bottom:14px;position:relative;overflow:hidden}
.pvhero::before{content:'';position:absolute;top:-25%;right:-10%;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,var(--jadef) 0%,transparent 70%)}
.pvtitle{font-size:17px;font-weight:800;line-height:1.3;margin-bottom:8px}
.pvmeta{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.pvmeta b{color:var(--t1);font-weight:600}
.pvstats{display:flex;gap:8px;flex-wrap:wrap}
.pvstat{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:3px;background:var(--bg3);padding:4px 10px;border-radius:20px}

/* STARS */
.strow{display:flex;gap:6px;margin-bottom:14px}
.stb{font-size:26px;background:none;border:none;cursor:pointer;transition:all .15s;color:var(--t3);line-height:1}
.stb.on{color:var(--gold);filter:drop-shadow(0 0 6px rgba(245,200,66,.6))}
.stb:active{transform:scale(.8)}

/* COMMENTS */
.cmthd{font-size:13px;font-weight:700;margin:14px 0 10px;display:flex;align-items:center;gap:6px}
.cmtbox{display:flex;gap:8px;margin-bottom:12px}
.cmtinp{flex:1;padding:10px 12px;background:var(--bg3);border:1px solid rgba(0,240,160,.2);border-radius:var(--r3);color:var(--t0);font-family:var(--ff);font-size:13px;outline:none;direction:rtl;resize:none;transition:border-color .15s}
.cmtinp:focus{border-color:var(--jade)}
.cmtsend{width:42px;height:42px;border-radius:var(--r3);background:var(--jade);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;align-self:flex-end;transition:transform .15s}
.cmtsend:active{transform:scale(.88)}
.cmti{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r3);padding:11px 13px;margin-bottom:7px;animation:fadeUp .25s ease}
.cmtauth{font-size:11px;font-weight:700;color:var(--jade);margin-bottom:4px}
.cmttxt{font-size:13px;line-height:1.5}
.cmtfoot{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.cmttime{font-size:10px;color:var(--t3)}

/* SEARCH */
.srchw{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid rgba(0,240,160,.2);border-radius:var(--r2);padding:0 12px;margin-bottom:13px;transition:all .15s}
.srchw:focus-within{border-color:var(--jade);box-shadow:0 0 0 2px var(--jadef)}
.srchinp{flex:1;padding:12px 4px;background:none;border:none;color:var(--t0);font-family:var(--ff);font-size:13px;outline:none;direction:rtl}
.srchinp::placeholder{color:var(--t3)}
.srchclr{background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;padding:4px;display:none}
.srchclr.on{display:block}
.srchtag{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--ln2);cursor:pointer;color:var(--t1);transition:all .15s;flex-shrink:0}
.srchtag:active{background:var(--jadef);color:var(--jade)}

/* BUTTONS */
.btn{width:100%;padding:13px;border-radius:var(--r2);font-family:var(--ff);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px}
.btn:active{transform:scale(.97);opacity:.85}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-jade{background:linear-gradient(135deg,var(--jade),var(--jade2));color:#000;box-shadow:0 4px 20px var(--jadef)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;box-shadow:0 4px 20px var(--goldf)}
.btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--t0);border:1px solid var(--ln2)}
.btn-danger{background:var(--rosef);color:var(--rose);border:1px solid rgba(244,63,94,.2)}
.btn-fav{background:var(--bg3);color:var(--t2);border:1px solid var(--ln2)}
.btn-fav.on{background:var(--goldf);color:var(--gold);border-color:rgba(245,200,66,.25)}
.sbtn{padding:5px 11px;border-radius:14px;font-family:var(--ff);font-size:10px;font-weight:700;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.sbtn:active{transform:scale(.88)}
.sbtn-r{background:var(--rosef);color:var(--rose);border:1px solid rgba(244,63,94,.2)}
.sbtn-j{background:var(--jadef);color:var(--jade);border:1px solid rgba(0,240,160,.2)}
.sbtn-g{background:var(--goldf);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.sbtn-gh{background:var(--bg3);color:var(--t2);border:1px solid var(--ln2)}

/* INPUTS */
.inp{width:100%;padding:12px 13px;background:var(--bg2);border:1px solid var(--ln2);border-radius:var(--r3);color:var(--t0);font-family:var(--ff);font-size:13px;outline:none;direction:rtl;transition:all .15s;margin-bottom:9px}
.inp:focus{border-color:var(--jade);box-shadow:0 0 0 2px var(--jadef)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:none;min-height:80px}
select.inp{-webkit-appearance:none}
.lbl{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;display:block}

/* INFO GROUP */
.igrp{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r2);padding:4px 14px;margin-bottom:13px}
.irow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--ln)}
.irow:last-child{border-bottom:none}
.ikey{font-size:12px;color:var(--t2);font-weight:600}
.ival{font-size:12px;font-weight:700;text-align:left}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:8px 12px;background:var(--bg2);border-radius:var(--r3);border:1px solid var(--ln);font-size:11px;margin-bottom:12px}
.bc-i{color:var(--t2);font-weight:600;max-width:80px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bc-i.on{color:var(--jade)}
.bc-s{color:var(--t3)}

/* TAG */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.tag-jade{background:var(--jadef);color:var(--jade);border:1px solid rgba(0,240,160,.2)}
.tag-gold{background:var(--goldf);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.tag-red{background:var(--rosef);color:var(--rose);border:1px solid rgba(244,63,94,.2)}
.tag-purple{background:var(--purplef);color:var(--purple);border:1px solid rgba(168,85,247,.2)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:10px;text-align:center}
.empty-ico{font-size:50px;opacity:.2}
.empty-t{font-size:14px;font-weight:700;color:var(--t2)}
.empty-s{font-size:12px;color:var(--t3);line-height:1.5}

/* TOAST */
#toast{position:fixed;bottom:calc(82px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:9999;width:calc(100% - 32px);max-width:360px;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.ti{padding:10px 16px;border-radius:var(--r2);font-family:var(--ff);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;animation:fadeUp .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.8);max-width:100%}
@keyframes tiOut{to{opacity:0;transform:translateY(8px) scale(.94)}}
.ti.ok{background:var(--jade);color:#000}.ti.err{background:var(--rose);color:#fff}.ti.info{background:var(--bg3);color:var(--t0);border:1px solid var(--ln2)}.ti.gold{background:var(--gold);color:#000}

/* ACHIEVE POPUP */
.achpop{position:fixed;top:14%;left:50%;transform:translateX(-50%) scale(.85);z-index:9990;background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(168,85,247,.1));border:1px solid rgba(245,200,66,.3);border-radius:var(--r1);padding:22px 26px;text-align:center;min-width:230px;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);pointer-events:none;backdrop-filter:blur(20px)}
.achpop.on{opacity:1;transform:translateX(-50%) scale(1)}

/* ADMIN PANEL */
.atabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:8px 13px 2px;gap:7px;flex-shrink:0;position:sticky;top:0;z-index:20;background:rgba(3,4,10,.96);backdrop-filter:blur(30px)}
.atabs::-webkit-scrollbar{display:none}
.atab{padding:7px 14px;border-radius:20px;font-family:var(--ff);font-size:11px;font-weight:700;border:1px solid var(--ln2);background:var(--bg2);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.atab.on{background:var(--jadef);color:var(--jade);border-color:rgba(0,240,160,.2)}
.abody{padding:13px}
.ag2{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
.ag3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.ast{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r2);padding:14px 10px;text-align:center;position:relative;overflow:hidden}
.ast::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ast.jade::before{background:var(--jade)}.ast.gold::before{background:var(--gold)}.ast.purple::before{background:var(--purple)}.ast.rose::before{background:var(--rose)}.ast.blue::before{background:var(--blue)}
.ast-v{font-size:24px;font-weight:900;line-height:1;margin-bottom:3px;font-family:var(--fm)}
.ast.jade .ast-v{color:var(--jade)}.ast.gold .ast-v{color:var(--gold)}.ast.purple .ast-v{color:var(--purple)}.ast.rose .ast-v{color:var(--rose)}.ast.blue .ast-v{color:var(--blue)}
.ast-l{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.7px;text-transform:uppercase}
.urow{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r3);padding:11px 12px;display:flex;align-items:center;gap:9px;margin-bottom:7px;transition:background .15s;cursor:pointer}
.urow:active{background:var(--bg3)}
.rep{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r3);padding:12px 13px;margin-bottom:8px}
.prog{background:var(--bg3);border-radius:3px;height:4px;overflow:hidden;margin-top:5px}
.prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--jade),var(--purple));transition:width .6s}

/* FOD */
.fod{background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(0,240,160,.06));border:1px solid rgba(245,200,66,.2);border-radius:var(--r1);padding:18px;margin-bottom:14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
.fod:active{transform:scale(.98)}
.fod::before{content:'';position:absolute;top:-30%;right:-10%;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,var(--goldg) 0%,transparent 70%)}
.fod-badge{display:inline-flex;align-items:center;gap:4px;background:var(--goldf);border:1px solid rgba(245,200,66,.25);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;color:var(--gold);margin-bottom:10px}
.fod-t{font-size:15px;font-weight:800;margin-bottom:5px;line-height:1.3}
.fod-s{font-size:11px;color:var(--t2);margin-bottom:10px}

/* ADS */
.adcard{background:var(--bg2);border:1px solid var(--ln2);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative}
.adcard:active{transform:scale(.98)}
.adcard.pinned{border-color:rgba(245,200,66,.25);background:linear-gradient(135deg,rgba(245,200,66,.05),var(--bg2))}
.adcard-img{width:100%;max-height:200px;object-fit:cover;display:block}
.adcard-body{padding:13px 14px}
.adcard-title{font-size:14px;font-weight:800;margin-bottom:4px;line-height:1.3}
.adcard-txt{font-size:12px;color:var(--t1);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.adcard-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}
.adcard-time{font-size:10px;color:var(--t3)}
.adcard-btn{padding:7px 16px;border-radius:20px;font-family:var(--ff);font-size:11px;font-weight:700;border:none;cursor:pointer;background:var(--jade);color:#000;transition:all .15s}
.adcard-btn:active{transform:scale(.9)}
.pin-label{position:absolute;top:10px;right:12px;font-size:9px;font-weight:700;color:var(--gold);background:var(--goldf);padding:2px 8px;border-radius:20px;border:1px solid rgba(245,200,66,.2)}

/* CHANNELS */
.chcard{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--r2);padding:14px 13px;display:flex;align-items:center;gap:12px;margin-bottom:9px}
.chav{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--bg3)}
.chbody{flex:1;min-width:0}
.chname{font-size:14px;font-weight:700;margin-bottom:3px}
.chdesc{font-size:11px;color:var(--t2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.chjoin{padding:8px 17px;border-radius:20px;font-family:var(--ff);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .15s;flex-shrink:0;background:var(--jade);color:#000}
.chjoin:active{transform:scale(.9)}
.chjoin.done{background:var(--bg3);color:var(--t2);border:1px solid var(--ln2)}

/* AI BOX */
.aibox{background:linear-gradient(135deg,var(--purplef),rgba(0,240,160,.05));border:1px solid rgba(168,85,247,.2);border-radius:var(--r3);padding:13px;margin-bottom:13px;position:relative;overflow:hidden}
.aidot{width:7px;height:7px;border-radius:50%;background:var(--purple);animation:pulse 1.6s ease-in-out infinite}
.ailabel{font-size:11px;font-weight:700;color:var(--purple)}
.aitxt{font-size:12px;color:var(--t2);line-height:1.5;margin-top:6px}

/* LOADING SCREEN */
#ls{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s}
.ls-orb{width:100px;height:100px;position:relative;margin-bottom:8px}
.ls-orb-inner{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,var(--jade),var(--purple));display:flex;align-items:center;justify-content:center;font-size:48px;animation:lsPulse 2s ease-in-out infinite;box-shadow:0 0 0 0 rgba(0,240,160,.3)}
@keyframes lsPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,240,160,.3),0 0 40px rgba(0,240,160,.2)}50%{box-shadow:0 0 0 20px rgba(0,240,160,.05),0 0 60px rgba(0,240,160,.3)}}
.ls-ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid transparent;background:linear-gradient(var(--bg),var(--bg)) padding-box,linear-gradient(135deg,var(--jade),var(--purple),var(--jade)) border-box;animation:lsRing 2.5s linear infinite}
@keyframes lsRing{to{transform:rotate(360deg)}}
.ls-name{font-size:28px;font-weight:900;font-family:var(--fm);background:linear-gradient(90deg,var(--jade),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.ls-sub{font-size:12px;color:var(--t2);font-weight:600;letter-spacing:.5px}
.ls-bar{width:140px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ls-fill{height:100%;background:linear-gradient(90deg,var(--jade),var(--purple));border-radius:2px;animation:lsFill 2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes lsFill{from{width:0}to{width:100%}}
.ls-dots{display:flex;gap:6px}
.ls-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:dotPulse 1.4s ease-in-out infinite}
.ls-dot:nth-child(2){animation-delay:.2s}
.ls-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(.8);background:var(--t3)}40%{transform:scale(1.2);background:var(--jade)}}

/* DVIDER */
.dvd{height:1px;background:var(--ln);margin:14px 0}
.dvd2{height:1px;background:linear-gradient(90deg,transparent,var(--jade),transparent);margin:14px 0;opacity:.3}

/* ── DYNAMIC LEVEL THEMES ── */
body.theme-lv0{--jade:#a0a0c0;--jadef:rgba(160,160,192,.08);--jadeg:rgba(160,160,192,.2)}
body.theme-lv1{--jade:#4d9fff;--jadef:rgba(77,159,255,.08);--jadeg:rgba(77,159,255,.2)}
body.theme-lv2{--jade:#10d9a0;--jadef:rgba(16,217,160,.08);--jadeg:rgba(16,217,160,.2)}
body.theme-lv3{--jade:#9d7dff;--jadef:rgba(157,125,255,.08);--jadeg:rgba(157,125,255,.2)}
body.theme-lv4{--jade:#e8b84b;--jadef:rgba(232,184,75,.08);--jadeg:rgba(232,184,75,.2)}
body.theme-lv5{--jade:#f5c842;--jadef:rgba(245,200,66,.1);--jadeg:rgba(245,200,66,.28)}
</style>
</head>
<body>

</div>

  <div style="font-size:12px;color:var(--t2);margin-top:3px" id="achSub"></div>
</div>

<div id="root" style="opacity:0;transition:opacity .5s">
  <div id="hdr">
    <div class="hbar">
      <button class="hback off" id="hBack" onclick="NAV.back()">‹</button>
      <div class="hlogo" id="hBrand">
        <div class="hmark">🎓</div>
        <div class="hname">EDUMASTER</div>
      </div>

      <div class="hacts">

const C={};
const SPEC_ICONS=['💻','🏥','📐','⚗️','📊','🔬','⚙️','🎨','📖','🌍','🎓','🔭','🧮','🏗️','💡','🧬','🧪','🎯','📡','🛡️'];
const LEVELS=[
  {min:0,max:49,n:'مبتدئ',i:'🌱',c:'lv0'},

  {min:150,max:399,n:'متعلم',i:'🎓',c:'lv2'},
  {min:400,max:799,n:'متقدم',i:'🔬',c:'lv3'},

];
const BADGES=[
  {id:'dl1',i:'📥',n:'أول تحميل',q:p=>p.downloads_count>=1},
  {id:'dl10',i:'📦',n:'10 تحميلات',q:p=>p.downloads_count>=10},
  {id:'dl50',i:'🚀',n:'محمّل نشيط',q:p=>p.downloads_count>=50},

];

if(tg){tg.ready();tg.expand();tg.setHeaderColor('#03040a');tg.setBackgroundColor('#03040a');ID_DATA=tg.initData||'';TG_USER=tg.initDataUnsafe?.user||null;}

const API={
  async r(m,p,b){
    const o={method:m,headers:{'Content-Type':'application/json','x-init-data':ID_DATA}};
    if(b)o.body=JSON.stringify(b);
    const rs=await fetch('/api'+p,o);
    if(!rs.ok){const e=await rs.json().catch(()=>({error:'خطأ '+rs.status}));throw new Error(e.error||'خطأ');}
    return rs.json();
  },
  get:p=>API.r('GET',p),
  post:(p,b)=>API.r('POST',p,b),
  async upload(path,fd){
    const rs=await fetch('/api'+path,{method:'POST',headers:{'x-init-data':ID_DATA},body:fd});
    if(!rs.ok){const e=await rs.json().catch(()=>({error:'فشل'}));throw new Error(e.error||'فشل');}
    return rs.json();
  }
};

async function cached(k,fn,ttl=300000){const c=C[k];if(c&&Date.now()-c.t<ttl)return c.v;const v=await fn();C[k]={v,t:Date.now()};return v;}
function bust(pre){for(const k in C)if(k.startsWith(pre))delete C[k];}
function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m,t='info'){const w=document.getElementById('toast');const e=document.createElement('div');e.className='ti '+t;e.textContent=m;w.appendChild(e);setTimeout(()=>{e.style.animation='tiOut .3s ease forwards';setTimeout(()=>e.remove(),300);},2800);}
function render(h,bk=false){const el=document.getElementById('cnt');el.innerHTML=`<div class="pg${bk?' bk':''}">${h}</div>`;el.scrollTop=0;}

function loader(){render(`<div class="ldr"><div class="spin"></div></div>`);}
function empty(i='📭',t='لا يوجد',s=''){return`<div class="empty"><div class="empty-ico">${i}</div><div class="empty-t">${t}</div>${s?`<div class="empty-s">${s}</div>`:''}</div>`;}
function skels(n=3){return Array(n).fill(`<div class="skel skel-row"></div>`).join('');}
function timeAgo(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'الآن';if(m<60)return m+'د';const h=Math.floor(m/60);if(h<24)return h+'س';const dy=Math.floor(h/24);if(dy<30)return dy+'ي';return new Date(d).toLocaleDateString('ar');}
function ftype(t){if(t==='link')return{i:'🔗',c:'lnk'};if(t==='photo')return{i:'🖼️',c:'img'};if(t==='video')return{i:'🎬',c:'vid'};return{i:'📄',c:'doc'};}
function lvl(pts){for(let i=LEVELS.length-1;i>=0;i--)if(pts>=LEVELS[i].min)return{idx:i,...LEVELS[i]};return{idx:0,...LEVELS[0]};}
function xpPct(pts){const l=lvl(pts);if(l.idx===LEVELS.length-1)return 100;return Math.round(((pts-l.min)/(l.max-l.min+1))*100);}
function starsHtml(avg,cnt){if(!avg)return'';const f=Math.round(avg);return`<span style="display:inline-flex;align-items:center;gap:1px">${[1,2,3,4,5].map(i=>`<span style="color:${i<=f?'#f5c842':'#303060'};font-size:11px">★</span>`).join('')}<span style="color:var(--t2);font-size:10px">${parseFloat(avg).toFixed(1)}${cnt?` (${cnt})`:''}</span></span>`;}
function avColor(id){const cs=['linear-gradient(135deg,#00f0a0,#00c880)','linear-gradient(135deg,#f5c842,#d4a820)','linear-gradient(135deg,#a855f7,#7c3aed)','linear-gradient(135deg,#3b82f6,#1d4ed8)','linear-gradient(135deg,#f43f5e,#be123c)','linear-gradient(135deg,#06b6d4,#0891b2)'];return cs[(parseInt(id)||0)%cs.length];}
function setHdr(title,showBack){document.getElementById('hBrand').style.display=title?'none':'flex';document.getElementById('hTitle').style.display=title?'block':'none';document.getElementById('hTitle').textContent=title||'';document.getElementById('hBack').classList.toggle('off',!showBack);}
function showAch(i,t,s){const p=document.getElementById('achPop');document.getElementById('achIco').textContent=i;document.getElementById('achTitle').textContent=t;document.getElementById('achSub').textContent=s;p.classList.add('on');setTimeout(()=>p.classList.remove('on'),3500);tg?.HapticFeedback?.notificationOccurred('success');}
function bcHtml(items){return`<div class="bc">${items.map((b,i)=>`<span class="bc-i${i===items.length-1?' on':''}">${esc(b)}</span>${i<items.length-1?'<span class="bc-s">›</span>':''}`).join('')}</div>`;}

// Owner stars animation

function applyLevelTheme(pts) {
  const lv = lvl(pts);
  document.body.className = document.body.className.replace(/theme-lvd/g, '');
  document.body.classList.add('theme-lv' + lv.idx);
  // Aurora color
  const colors = ['#a0a0c0','#4d9fff','#10d9a0','#9d7dff','#e8b84b','#f5c842'];
  const col = colors[lv.idx] || '#10d9a0';
  document.querySelector('.aurora-a')?.style.setProperty('background', 
    'radial-gradient(circle,' + col + '22 0%,transparent 60%)');
}

function createOwnerStars(container){
  for(let i=0;i<20;i++){
    const star=document.createElement('div');
    star.className='owner-star';
    star.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px`;
    container.appendChild(star);
  }
}

const NAV={
  tab(name){
    _tab=name;STACK=[];_isBack=false;

  go(page,params={},title=''){
    STACK.push({page,params,title,tab:_tab});
    setHdr(title,true);tg?.BackButton?.show();

  },
  back(){
    const pv=STACK.pop();_isBack=true;
    if(!pv||STACK.length===0){setHdr('',false);tg?.BackButton?.hide();({home:P.home,browse:P.browse,ads:P.ads,channels:P.channels,profile:P.profile,search:P.search,admin:P.admin})[pv?.tab||_tab]?.();}
    else{const top=STACK[STACK.length-1];setHdr(top.title,true);tg?.BackButton?.show();P[pv.page]?.(pv.params);}

};
tg?.BackButton?.onClick(()=>NAV.back());

const P={

/* SEARCH */
function onSearch(q){document.getElementById('sc')?.classList.toggle('on',q.length>0);clearTimeout(_srchTimer);if(q.length<2){document.getElementById('sr').innerHTML=empty('🔍','اكتب حرفين');return;}document.getElementById('sr').innerHTML=`<div class="ldr"><div class="spin"></div></div>`;_srchTimer=setTimeout(()=>runSearch(q),380);}
async function runSearch(q){if(!q||q.length<2)return;const si=document.getElementById('si');if(si)si.value=q;_srchHist=_srchHist.filter(h=>h!==q);_srchHist.push(q);
  try{const res=await API.get('/search?q='+encodeURIComponent(q));const el=document.getElementById('sr');if(!el)return;if(!res.length){el.innerHTML=empty('😕','لا نتائج');return;}el.innerHTML=res.map(f=>{const{i:ico,c}=ftype(f.file_type);return`<div class="fc" onclick='NAV.go("preview",{fileId:${f.id}},"📄 ${esc(f.title.substring(0,22))}")'>
    <div class="fci ${c}">${ico}</div>
    <div class="fcb"><div class="fct">${esc(f.title)}</div><div class="fcm"><span class="fctg">📖 ${esc(f.subject_name||'')}</span><span class="fctg"> · ⬇️ ${f.downloads||0}</span></div></div>
    <span class="fca">›</span></div>`;}).join('');}catch(e){const el=document.getElementById('sr');if(el)el.innerHTML=empty('❌','خطأ');}
}

async function searchById(q) {
  const el = document.getElementById('sr');
  if (el) el.innerHTML = '<div class="ldr"><div class="spin"></div></div>';
  try {
    // جرب بحث بـ ID أولاً لو رقم
    const isId = /^d+$/.test(q.trim());
    const res = await API.get('/search?q=' + encodeURIComponent(q));
    el.innerHTML = res.map(f => {
      const {i: ico, c: fc} = ftype(f.file_type);
      return '<div class="fc" onclick='NAV.go("preview",{fileId:' + f.id + '},"📄 ' + esc(f.title.substring(0,22)) + '")'>'+
        '<div class="fci ' + fc + '">' + ico + '</div>'+
        '<div class="fcb"><div class="fct">' + esc(f.title) + '</div>'+
        '<div class="fcm"><span class="fctg">📖 ' + esc(f.subject_name||'') + '</span><span class="fctg"> · ⬇️ ' + (f.downloads||0) + '</span></div></div>'+
        '<span class="fca">›</span></div>';
    }).join('');
  } catch(e) { if(el) el.innerHTML = empty('❌','خطأ'); }
}

function clrSearch(){const si=document.getElementById('si');if(si){si.value='';si.focus();}document.getElementById('sc')?.classList.remove('on');document.getElementById('sr').innerHTML=empty('🔍','ابحث');}

/* INIT */
async function init(){
  await new Promise(r=>setTimeout(r,1800));
  try{
    const prof=await API.get('/profile');
    PROFILE=prof;IS_ADMIN=prof.isAdmin;IS_OWNER=prof.isOwner;TG_USER=prof.user||TG_USER;
    if(IS_ADMIN||IS_OWNER){
      document.getElementById('hAdminBtn').style.display='flex';
      const nb=document.getElementById('nbar');
      nb.style.gridTemplateColumns='repeat(6,1fr)';
      nb.insertAdjacentHTML('beforeend',`<button class="nb" id="nb-admin" onclick="NAV.tab('admin')"><div class="nbbar"></div><span class="nbico">${IS_OWNER?'👑':'🛡️'}</span>${IS_OWNER?'المالك':'إدارة'}</button>`);
    }
    API.post('/points/daily').catch(()=>{});
    if(pts&&pts.total_points) applyLevelTheme(pts.total_points);
    const pts=await API.get('/points/me').catch(()=>null);
    if(pts){POINTS=pts;if(pts.streak_days===7)showAch('🔥','7 أيام متتالية!','شارة جديدة 🎯');if(pts.total_points>=100&&pts.total_points<110)showAch('💎','100 XP!','أحسنت 💪');}
  }catch(e){}
  const ls=document.getElementById('ls'),root=document.getElementById('root');
  ls.style.opacity='0';root.style.opacity='1';
  setTimeout(()=>ls.style.display='none',600);
  NAV.tab('home');
}
window.addEventListener('load',init);
